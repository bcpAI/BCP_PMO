<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Suite — Pilotage de plans d'action</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
:root{
  /* === Charte cabinet BCP — Business Consulting Partners === */
  --bcp-blue:#13547E;
  --bcp-blue-2:#1a6796;
  --bcp-blue-dark:#0e3f5e;
  --bcp-blue-soft:#EEF3F6;
  --bcp-blue-tint:#dbe8ef;
  --bcp-anthra:#40444D;
  --bcp-anthra-soft:#5c606a;

  --ink:#40444D;
  --ink-soft:#6b6f78;
  --paper:#ffffff;
  --paper-2:#f5f7f9;
  --card:#ffffff;
  --line:#dde3e8;
  --line-soft:#eaeef2;

  /* Alias conservés pour compatibilité avec le code existant */
  --forest:#13547E;
  --forest-2:#1a6796;
  --sage:#a8c4d8;
  --gold:#13547E;
  --gold-soft:#1a6796;
  --rust:#b3361f;
  --rust-soft:#d04a30;
  --blue:#13547E;
  --plum:#5c606a;
  --ok:#1f7a4d;
  --warn:#1a6796;
  --late:#b3361f;
  --todo:#8a8d95;
  --doing:#13547E;
  --done:#1f7a4d;
  --blocked:#b3361f;
  --shadow:0 1px 2px rgba(19,84,126,.05),0 8px 24px rgba(19,84,126,.06);
  --shadow-lg:0 4px 12px rgba(19,84,126,.08),0 24px 48px rgba(19,84,126,.10);
  --r:12px;
  --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Spline Sans',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 12% 18%,rgba(19,84,126,.10),transparent 30%),
    radial-gradient(circle at 88% 82%,rgba(26,103,150,.08),transparent 32%);
  background-attachment:fixed;
}
h1,h2,h3,h4{font-family:'Inter',system-ui,sans-serif;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
::selection{background:var(--forest);color:#fff}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c8d4de;border-radius:8px;border:3px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:#b3a584}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;flex-shrink:0;background:var(--bcp-blue);
  color:#e9eef3;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  background-image:linear-gradient(170deg,#1a6796 0%,#13547E 45%,#0e3f5e 100%);
}
.brand{padding:24px 22px 20px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:#fff;display:grid;place-items:center;
  box-shadow:0 4px 12px rgba(0,0,0,.18);padding:6px;
}
.brand-logo img{width:100%;height:auto;display:block}
.brand-text{flex:1;min-width:0}
.brand .name{font-family:'Inter',system-ui,sans-serif;font-size:18px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-.01em}
.brand .tag{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-top:4px;font-weight:500}

.proj-switch{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.10)}
.proj-switch label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);display:block;margin-bottom:7px;font-weight:600}
.proj-select-wrap{position:relative}
.proj-select{
  width:100%;padding:10px 12px;border-radius:9px;
  background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);
  font-weight:500;cursor:pointer;appearance:none;font-size:13px;padding-right:30px;
}
.proj-select option{background:#13547E;color:#fff}
.proj-select-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--sage);pointer-events:none;font-size:11px}
.proj-actions{display:flex;gap:6px;margin-top:8px}
.proj-actions button{
  flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:600;
  background:rgba(255,255,255,.07);color:#cfe0d2;border:1px solid rgba(255,255,255,.10);
  transition:.15s
}
.proj-actions button:hover{background:rgba(255,255,255,.16);color:#fff}

.nav{flex:1;padding:14px 12px;overflow-y:auto}
.nav-group{margin-bottom:6px}
.nav-group-label{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:rgba(178,196,178,.6);padding:12px 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
  color:#cfe0d2;font-weight:500;font-size:13.5px;width:100%;text-align:left;
  transition:.15s;margin-bottom:2px;position:relative
}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--gold-soft)}
.nav-item .ico{width:18px;text-align:center;font-size:15px;flex-shrink:0;opacity:.92}
.nav-item .badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;font-weight:700;min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.sidebar-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.10);font-size:10.5px;color:var(--sage);line-height:1.6}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:16px;padding:16px 30px;
  background:rgba(251,250,246,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30
}
.topbar h1{font-size:21px}
.topbar .crumb{font-size:11.5px;color:var(--ink-soft);letter-spacing:.04em;margin-bottom:2px}
.topbar-spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;
  font-weight:600;font-size:13px;transition:.15s;white-space:nowrap;border:1px solid transparent
}
.btn-primary{background:var(--forest);color:#fff;box-shadow:var(--shadow)}
.btn-primary:hover{background:var(--forest-2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn-ghost{background:var(--card);color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{background:#fff;border-color:#c9c1ad}
.btn-gold{background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:#fff;box-shadow:var(--shadow)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.btn .ico{font-size:14px}
.btn-sm{padding:6px 11px;font-size:12px}

.view{padding:28px 30px 60px;flex:1;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== CARDS / KPIs ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.kpi{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden
}
.kpi::after{content:"";position:absolute;top:0;right:0;width:64px;height:64px;border-radius:0 0 0 100%;opacity:.10}
.kpi.k-total::after{background:var(--blue)}
.kpi.k-done::after{background:var(--ok)}
.kpi.k-doing::after{background:var(--gold)}
.kpi.k-late::after{background:var(--rust)}
.kpi .kpi-label{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.kpi .kpi-val{font-family:'Inter',system-ui,sans-serif;font-size:38px;font-weight:600;line-height:1;margin:10px 0 4px;letter-spacing:-.02em}
.kpi .kpi-sub{font-size:11.5px;color:var(--ink-soft)}
.kpi .kpi-sub .up{color:var(--ok);font-weight:600}
.kpi .kpi-sub .down{color:var(--rust);font-weight:600}
.kpi.k-late .kpi-val{color:var(--rust)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.panel-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line-soft)}
.panel-head h2{font-size:16px}
.panel-head h3{font-size:14.5px}
.panel-head .sub{font-size:11.5px;color:var(--ink-soft)}
.panel-head .spacer{flex:1}
.panel-body{padding:20px}
.panel-body.flush{padding:0}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:1100px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{
  text-align:left;padding:11px 14px;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:700;background:var(--paper-2);border-bottom:1px solid var(--line);
  white-space:nowrap;position:sticky;top:0
}
table.tbl td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr{transition:.12s}
table.tbl tbody tr:hover{background:rgba(19,84,126,.07)}
table.tbl tr.late-row{background:rgba(168,75,42,.05)}
table.tbl tr.late-row:hover{background:rgba(168,75,42,.09)}
.cell-desc{max-width:380px;min-width:240px}
.cell-desc .d-title{font-weight:500;color:var(--ink);line-height:1.35}
.cell-desc .d-sp{font-size:11px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:5px}
.ref-chip{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--forest);background:rgba(19,84,126,.08);padding:2px 6px;border-radius:5px;font-weight:600;white-space:nowrap}

.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-todo{background:rgba(138,130,117,.14);color:#5f584c}
.st-todo .tag-dot{background:var(--todo)}
.st-doing{background:rgba(58,90,122,.13);color:#2c4762}
.st-doing .tag-dot{background:var(--doing)}
.st-done{background:rgba(31,122,77,.14);color:#13547E}
.st-done .tag-dot{background:var(--done)}
.st-blocked{background:rgba(168,75,42,.14);color:#8a3c22}
.st-blocked .tag-dot{background:var(--blocked)}

.prio{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.prio::before{content:"";width:8px;height:8px;border-radius:2px;transform:rotate(45deg)}
.prio-Haute::before{background:var(--rust)}
.prio-Moyenne::before{background:var(--gold)}
.prio-Faible::before{background:var(--sage)}
.prio-Haute{color:var(--rust)}
.prio-Moyenne{color:#946b25}
.prio-Faible{color:#5a7363}

.alert-flag{color:var(--rust);font-weight:700;font-size:15px}

.prog-wrap{display:flex;align-items:center;gap:9px;min-width:130px}
.prog-bar{flex:1;height:7px;background:var(--paper-2);border-radius:5px;overflow:hidden;border:1px solid var(--line-soft)}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--forest-2),var(--sage));transition:width .4s}
.prog-fill.full{background:linear-gradient(90deg,var(--ok),#4a9b6f)}
.prog-pct{font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink-soft);min-width:34px;text-align:right}

.row-actions{display:flex;gap:4px;opacity:0;transition:.15s}
tr:hover .row-actions{opacity:1}
.icon-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--ink-soft);transition:.12s;font-size:13px}
.icon-btn:hover{background:var(--paper-2);color:var(--ink)}
.icon-btn.del:hover{background:rgba(168,75,42,.12);color:var(--rust)}

/* ===== FILTER BAR ===== */
.filterbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:18px}
.search-box{position:relative;flex:1;min-width:200px;max-width:340px}
.search-box input{width:100%;padding:9px 12px 9px 34px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.search-box input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(19,84,126,.15)}
.search-box .s-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:13px}
.fselect{padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-weight:500;cursor:pointer}
.fselect:focus{outline:none;border-color:var(--sage)}
.chip-toggle{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-weight:600;font-size:12.5px;color:var(--ink-soft);transition:.15s}
.chip-toggle.on{background:var(--rust);color:#fff;border-color:var(--rust)}

/* ===== FORMS / MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(22,32,28,.45);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-lg);width:100%;max-width:640px;animation:pop .25s cubic-bezier(.16,1,.3,1);border:1px solid var(--line)}
.modal.wide{max-width:860px}
.modal.modal-lg{max-width:820px}
.modal-lg .modal-body{max-height:70vh;overflow-y:auto}
.filter-input{font:13.5px/1.4 'Spline Sans',sans-serif;padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.filter-input:focus{outline:none;border-color:var(--bcp-blue);box-shadow:0 0 0 3px rgba(19,84,126,.12)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line-soft)}
.modal-head h2{font-size:18px}
.modal-head .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
.modal-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:18px;color:var(--ink-soft)}
.modal-close:hover{background:var(--paper-2);color:var(--ink)}
.modal-body{padding:24px;max-height:65vh;overflow-y:auto}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--line-soft);background:var(--paper-2);border-radius:0 0 var(--r) var(--r)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-row.full{grid-column:1/-1}
.form-row label{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em}
.form-row label .req{color:var(--rust)}
.form-row input,.form-row select,.form-row textarea{
  padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);width:100%
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(19,84,126,.15)}
.form-row textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-row .hint{font-size:10.5px;color:var(--ink-soft)}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1;accent-color:var(--forest)}
.range-val{font-family:'Spline Sans Mono',monospace;font-weight:600;min-width:46px;text-align:right;color:var(--forest)}

/* ===== EMPTY / MISC ===== */
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty .e-ico{font-size:46px;opacity:.4;margin-bottom:14px}
.empty h3{font-size:18px;margin-bottom:6px;color:var(--ink)}
.empty p{font-size:13.5px;max-width:380px;margin:0 auto 18px}

.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--ink-soft)}
.legend .li{display:flex;align-items:center;gap:6px}
.legend .sw{width:13px;height:13px;border-radius:4px}

.chart-box{position:relative;height:280px}
.chart-box.sm{height:230px}

.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200}
.toast{background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .3s cubic-bezier(.16,1,.3,1);max-width:360px}
.toast.ok{background:var(--forest)}
.toast.warn{background:var(--rust)}
.toast .t-ico{font-size:16px}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

/* sub-project group header */
.sp-group td{background:linear-gradient(90deg,rgba(19,84,126,.07),transparent);font-weight:700;font-family:'Inter',system-ui,sans-serif;font-size:13.5px;color:var(--forest);padding:9px 14px;border-bottom:1px solid var(--line)}
.sp-group .sp-count{font-family:'Spline Sans',sans-serif;font-weight:600;font-size:11px;color:var(--ink-soft);margin-left:8px}

/* committee / roadmap */
.gantt-wrap{overflow-x:auto;padding-bottom:8px}
table.gantt{border-collapse:collapse;font-size:12px;min-width:720px;width:100%}
table.gantt th{padding:8px 6px;font-size:10px;font-weight:700;color:var(--ink-soft);border-bottom:1px solid var(--line);text-align:center;white-space:nowrap}
table.gantt th.lab{text-align:left;min-width:230px;position:sticky;left:0;background:var(--card);z-index:2}
table.gantt td{border-bottom:1px solid var(--line-soft);height:34px;padding:0 2px}
table.gantt td.lab{font-size:12px;position:sticky;left:0;background:var(--card);z-index:1;padding:4px 10px 4px 4px;max-width:240px}
table.gantt td.lab .gref{font-family:'Spline Sans Mono',monospace;font-size:9.5px;color:var(--forest);font-weight:600}
.gbar{height:18px;border-radius:5px;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.gbar .gfill{height:100%;border-radius:5px;opacity:.92}
.gbar.late{outline:2px solid var(--rust);outline-offset:1px}

.blocker-card{display:flex;gap:13px;padding:14px 16px;border:1px solid var(--line);border-left:3px solid var(--rust);border-radius:10px;background:var(--card);margin-bottom:11px}
.blocker-card .bc-ico{color:var(--rust);font-size:18px;flex-shrink:0;margin-top:1px}
.blocker-card .bc-body{flex:1;min-width:0}
.blocker-card .bc-title{font-weight:600;line-height:1.35;margin-bottom:3px}
.blocker-card .bc-meta{font-size:11.5px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:10px}

.cr-zone{border:2px dashed var(--line);border-radius:var(--r);padding:24px;text-align:center;transition:.2s;background:var(--paper-2)}
.cr-zone.drag{border-color:var(--forest);background:rgba(19,84,126,.10)}

/* ============================================================
   ÉDITEUR DE COMPTES RENDUS PMO
   ============================================================ */
.cr-editor-layout{display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start}
.cr-toc{position:sticky;top:24px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 0;box-shadow:var(--shadow);max-height:calc(100vh - 48px);overflow-y:auto}
.cr-toc-head{padding:0 18px 14px;border-bottom:1px solid var(--line-soft)}
.cr-toc-ref{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--bcp-blue);font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.cr-toc-title{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:10px}
.cr-toc-progress small{font-size:11px;color:var(--ink-soft);display:block;margin-top:5px}
.cr-toc-nav{padding:8px 0;display:flex;flex-direction:column}
.cr-toc-link{display:flex;align-items:center;gap:10px;padding:8px 18px;text-decoration:none;color:var(--ink-soft);font-size:13px;border-left:3px solid transparent;transition:.15s}
.cr-toc-link:hover{background:var(--bcp-blue-soft);color:var(--bcp-blue);border-left-color:var(--bcp-blue)}
.cr-toc-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--bcp-blue-soft);color:var(--bcp-blue);font-size:11px;font-weight:700;flex-shrink:0}
.cr-toc-foot{padding:14px 18px 4px;border-top:1px solid var(--line-soft);margin-top:8px}

/* Workflow CR */
.cr-wf-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;margin-top:10px}
.cr-wf-banner{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--shadow)}
.cr-wf-msg{flex:1;min-width:220px;font-size:13.5px;color:var(--ink);line-height:1.5}
.cr-wf-actions{display:flex;gap:8px;flex-wrap:wrap}
.cr-lock-note{background:#1F7A4D14;border:1px solid #1F7A4D44;color:#155c39;border-radius:10px;padding:11px 16px;font-size:13px;margin-bottom:16px}
.cr-fieldset{border:none;padding:0;margin:0;min-width:0}
.cr-fieldset[disabled]{opacity:.72}
.cr-fieldset[disabled] input,.cr-fieldset[disabled] select,.cr-fieldset[disabled] textarea,.cr-fieldset[disabled] button{cursor:not-allowed}
.cr-mail-note{background:var(--bcp-blue-soft);border:1px solid var(--bcp-blue-tint);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--bcp-blue-dark);line-height:1.5}
.disp-block{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.disp-head{background:var(--paper-2);padding:11px 14px;font-size:13.5px}
.disp-block .cr-tbl{margin:0}
.disp-block .cr-tbl thead th{background:#fff}

.cr-form{display:flex;flex-direction:column;gap:18px}
.cr-section{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px 28px;box-shadow:var(--shadow);scroll-margin-top:90px}
.cr-sec-head{display:flex;align-items:center;gap:14px;padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid var(--line-soft)}
.cr-sec-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--bcp-blue);color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.cr-sec-head h3{font-family:'Inter',system-ui,sans-serif;font-size:18px;font-weight:600;color:var(--ink);flex:1;letter-spacing:-.01em}
.cr-sec-head .btn{margin-left:8px}

.cr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cr-grid .field{display:flex;flex-direction:column;gap:6px}
.cr-grid .cr-col-2{grid-column:span 2}
.cr-grid label{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em}
.cr-grid input,.cr-grid select,.cr-grid textarea,.cr-section .field textarea,.cr-section .field input,.cr-section .field select{
  font:14px/1.4 'Spline Sans',sans-serif;border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:#fff;color:var(--ink);width:100%;transition:.15s
}
.cr-grid input:focus,.cr-grid select:focus,.cr-grid textarea:focus,.cr-section .field input:focus,.cr-section .field select:focus,.cr-section .field textarea:focus{outline:none;border-color:var(--bcp-blue);box-shadow:0 0 0 3px rgba(19,84,126,.10)}
.cr-section .field label{font-size:11.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;display:block;margin-bottom:6px}
.cr-section .field{display:flex;flex-direction:column;gap:6px}
.cr-section .field textarea{font-family:'Spline Sans',sans-serif;resize:vertical;min-height:90px}

/* Tableaux dynamiques CR */
.cr-tbl{font-size:13px}
.cr-tbl thead th{background:var(--bcp-blue-soft);color:var(--bcp-blue-dark);font-weight:600;font-size:11.5px;padding:10px 12px;text-transform:none;letter-spacing:0}
.cr-tbl tbody td{padding:6px 8px;vertical-align:middle}
.cr-tbl tbody tr:hover{background:transparent}
.cr-tbl input[type="text"],.cr-tbl input[type="date"],.cr-tbl input[type="time"],.cr-tbl select,.cr-tbl textarea{
  font:13px/1.4 'Spline Sans',sans-serif;border:1px solid transparent;background:transparent;padding:6px 8px;border-radius:6px;width:100%;color:var(--ink);transition:.15s
}
.cr-tbl input:hover,.cr-tbl select:hover,.cr-tbl textarea:hover{background:var(--paper-2)}
.cr-tbl input:focus,.cr-tbl select:focus,.cr-tbl textarea:focus{outline:none;background:#fff;border-color:var(--bcp-blue);box-shadow:0 0 0 3px rgba(19,84,126,.10)}
.cr-tbl input[type="checkbox"]{width:16px;height:16px;accent-color:var(--bcp-blue);cursor:pointer}
.cr-tbl textarea{resize:vertical;font-family:'Spline Sans',sans-serif;min-height:60px}
.cr-tbl .muted{color:var(--ink-soft);font-style:italic}

.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;background:transparent;color:var(--ink-soft);font-size:14px;border:none;cursor:pointer;transition:.15s}
.btn-icon:hover{background:rgba(179,54,31,.10);color:var(--rust)}

/* Responsive : éditeur CR mobile */
@media (max-width: 1000px){
  .cr-editor-layout{grid-template-columns:1fr}
  .cr-toc{position:relative;top:auto;max-height:none}
  .cr-grid{grid-template-columns:1fr 1fr}
  .cr-grid .cr-col-2{grid-column:span 2}
}
@media (max-width: 640px){
  .cr-section{padding:18px 14px}
  .cr-grid{grid-template-columns:1fr}
  .cr-grid .cr-col-2{grid-column:span 1}
}
.parsed-action{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:9px;text-align:left}
.parsed-action input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:var(--forest);flex-shrink:0}
.parsed-action .pa-body{flex:1;min-width:0}
.parsed-action .pa-title{font-weight:500;line-height:1.4}
.parsed-action .pa-meta{font-size:11px;color:var(--ink-soft);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}

@media(max-width:860px){
  .sidebar{position:fixed;left:-260px;z-index:200;transition:.3s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}
  .menu-toggle{display:grid!important}
  .view{padding:18px 16px 50px}
  .topbar{padding:14px 16px}
  .form-grid{grid-template-columns:1fr}
}
.menu-toggle{display:none;width:38px;height:38px;border-radius:9px;place-items:center;font-size:19px;color:var(--ink);background:var(--card);border:1px solid var(--line)}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150}
.scrim.show{display:block}
</style>

function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return "—";
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"}); }
function daysBetween(a,b){ return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5); }
function monthKey(d=new Date()){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function prevMonthKey(){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); return monthKey(d); }
function excelSerialToISO(n){ // convertit un n° de série Excel en date ISO
  const ms=(n-25569)*86400*1000; const d=new Date(ms); return isNaN(d)?"":d.toISOString().slice(0,10); }

/* ---------- Échéance effective & retard ---------- */
function effDue(a){ return a.dateFinRevisee || a.dateFinPlan || ""; }
function noDueDate(a){ return !effDue(a) && a.statut!=="Terminé"; }
function isLate(a){ const due=effDue(a); if(!due||a.statut==="Terminé") return false; return due < todayISO(); }
function daysLate(a){ const due=effDue(a); if(!isLate(a)) return 0; return daysBetween(due,todayISO()); }

/* ---------- Synchronisation cloud (Supabase) ----------
   L'utilisateur configure URL + clé anon + clé d'espace (mot de passe).
   Auto-push après chaque modification (debounce 1.5 s).
   Pull manuel ou au démarrage. */
let CLOUD_TIMER=null, CLOUD_STATUS="idle"; // idle|saving|saved|error|off
function cloudReady(){
  const c=DB.settings?.cloud; return !!(c && c.url && c.anonKey && c.spaceKey);
}
function cloudHeaders(){
  const c=DB.settings.cloud;
  return {"apikey":c.anonKey,"Authorization":`Bearer ${c.anonKey}`,"Content-Type":"application/json"};
}
function cloudAutoPush(){
  if(!cloudReady()) { CLOUD_STATUS="off"; renderCloudBadge(); return; }
  if(CLOUD_TIMER) clearTimeout(CLOUD_TIMER);
  CLOUD_STATUS="saving"; renderCloudBadge();
  CLOUD_TIMER=setTimeout(()=>cloudPush(true),1500);
}
async function cloudPush(silent=false){
  if(!cloudReady()){ if(!silent) toast("Synchronisation non configurée","warn"); return false; }
  const c=DB.settings.cloud;
  const body=JSON.stringify({
    space_key:c.spaceKey,
    payload:{projects:DB.projects,activeId:DB.activeId},
    updated_at:new Date().toISOString()
  });
  try{
    const r=await fetch(`${c.url.replace(/\/$/,"")}/rest/v1/pmo_data`,{
      method:"POST",
      headers:{...cloudHeaders(),"Prefer":"resolution=merge-duplicates,return=minimal"},
      body
    });
    if(!r.ok){ throw new Error("HTTP "+r.status); }
    CLOUD_STATUS="saved"; renderCloudBadge();
    if(!silent) toast("Synchronisé dans le cloud");
    return true;
  }catch(e){
    CLOUD_STATUS="error"; renderCloudBadge();
    if(!silent) toast("Erreur de synchro : "+e.message,"warn");
    return false;
  }
}
async function cloudPull(){
  if(!cloudReady()){ toast("Synchronisation non configurée","warn"); return null; }
  const c=DB.settings.cloud;
  try{
    const url=`${c.url.replace(/\/$/,"")}/rest/v1/pmo_data?space_key=eq.${encodeURIComponent(c.spaceKey)}&select=payload,updated_at`;
    const r=await fetch(url,{headers:cloudHeaders()});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const arr=await r.json();
    if(!arr.length){ toast("Aucune donnée trouvée dans le cloud pour cet espace","warn"); return null; }
    return arr[0];
  }catch(e){ toast("Erreur de lecture cloud : "+e.message,"warn"); return null; }
}
async function cloudPullAndApply(){
  const rec=await cloudPull(); if(!rec) return;
  const remote=rec.payload;
  if(!remote || !remote.projects){ toast("Données cloud invalides","warn"); return; }
  const cloudCfg=DB.settings.cloud;
  if(!confirm(`Remplacer vos données locales par la version du cloud ?\nDernière mise à jour : ${new Date(rec.updated_at).toLocaleString("fr-FR")}\n(Vos données actuelles seront écrasées)`)) return;
  DB.projects=remote.projects;
  DB.activeId=remote.activeId||(DB.projects[0]&&DB.projects[0].id);
  DB.settings.cloud=cloudCfg; // ne pas écraser la config locale
  try{ localStorage.setItem(LS_KEY,JSON.stringify(DB)); }catch(e){}
  toast("Données récupérées du cloud");
  render();
}
function renderCloudBadge(){
  const el=$("#cloudBadge"); if(!el) return;
  const map={
    off:{t:"☁ Local uniquement",cl:"st-todo"},
    idle:{t:"☁ Cloud prêt",cl:"st-doing"},
    saving:{t:"☁ Synchronisation…",cl:"st-doing"},
    saved:{t:"☁ Synchronisé",cl:"st-done"},
    error:{t:"☁ Erreur cloud",cl:"st-blocked"}
  };
  const s=map[CLOUD_STATUS]||map.off;

}

function activeProject(){ return DB.projects.find(p=>p.id===DB.activeId); }
function actions(){ return activeProject()?.actions||[]; }

/* ---------- Snapshots mensuels (pour comparatif M vs M-1) ---------- */
function ensureSnapshot(){
  const p=activeProject(); if(!p) return;
  p.snapshots = p.snapshots||{};
  const mk=monthKey();
  // on rafraîchit toujours le snapshot du mois courant
  p.snapshots[mk]=computeSnapshot(p);
}
function computeSnapshot(p){
  const a=p.actions;
  const done=a.filter(x=>x.statut==="Terminé").length;
  const avg=a.length? Math.round(a.reduce((s,x)=>s+(+x.avancement||0),0)/a.length):0;
  return { total:a.length, done, doing:a.filter(x=>x.statut==="En cours").length,
    blocked:a.filter(x=>x.statut==="Bloqué").length, late:a.filter(isLate).length,
    avgProgress:avg, closure:a.length?Math.round(done/a.length*100):0, ts:Date.now() };
}
function getSnapshot(mk){ const p=activeProject(); return p?.snapshots?.[mk]||null; }

/* ---------- Stats du projet actif ---------- */
function stats(){
  const a=actions();
  const done=a.filter(x=>x.statut==="Terminé").length;
  const doing=a.filter(x=>x.statut==="En cours").length;
  const todo=a.filter(x=>x.statut==="À faire").length;
  const blocked=a.filter(x=>x.statut==="Bloqué").length;
  const late=a.filter(isLate);
  const noDue=a.filter(noDueDate);
  const avg=a.length?Math.round(a.reduce((s,x)=>s+(+x.avancement||0),0)/a.length):0;
  const closure=a.length?Math.round(done/a.length*100):0;
  return {total:a.length,done,doing,todo,blocked,late:late.length,lateList:late,noDue:noDue.length,noDueList:noDue,avgProgress:avg,closure};
}

/* ---------- Regroupement par sous-projet ---------- */
function bySubProject(){
  const map={};
  actions().forEach(a=>{ const k=a.sousProjet||"(Sans sous-projet)"; (map[k]=map[k]||[]).push(a); });
  return map;
}
function subProjectList(){ return [...new Set(actions().map(a=>a.sousProjet).filter(Boolean))]; }
function responsableList(){ return [...new Set(actions().map(a=>a.responsable).filter(Boolean))].sort(); }

/* ---------- Génération de référence d'action ---------- */
function genRef(p,a){
  const prefix=(p.code||"PRJ");
  const n=(p.actions.indexOf(a)+1);
  return `${prefix}_ACT_${String(n).padStart(2,"0")}`;
}
function reindexRefs(p){ p.actions.forEach((a,i)=>{ if(a.autoRef!==false) a.ref=`${p.code||"PRJ"}_ACT_${String(i+1).padStart(2,"0")}`; }); }

function toast(msg,type="ok"){
  const w=$("#toasts"); const el=document.createElement("div");
  el.className="toast "+(type==="warn"?"warn":type==="ok"?"ok":"");
  const ico=type==="warn"?"⚠️":type==="ok"?"✓":"ℹ️";
  el.innerHTML=`<span class="t-ico">${ico}</span><span>${esc(msg)}</span>`;
  w.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateX(40px)"; el.style.transition=".3s"; setTimeout(()=>el.remove(),300); },3200);
}

function deltaBadge(cur,prev,invert=false){
  if(prev==null) return "";
  const d=cur-prev; if(d===0) return `<span style="color:var(--ink-soft)">→ stable</span>`;
  const up=d>0; const good=invert?!up:up;
  const cls=good?"up":"down"; const arrow=up?"▲":"▼";
  return `<span class="${cls}">${arrow} ${up?"+":""}${d} vs M-1</span>`;
}

    const done=list.filter(a=>a.statut==="Terminé").length;
    const cl=Math.round(done/list.length*100);
    const avg=Math.round(list.reduce((a,b)=>a+(+b.avancement||0),0)/list.length);
    return {sp,total:list.length,done,cl,avg,color:SP_COLORS[i%SP_COLORS.length],
      late:list.filter(isLate).length,blocked:list.filter(a=>a.statut==="Bloqué").length};
  });

  return `

    <div class="kpi k-late"><div class="kpi-label">En retard</div>
      <div class="kpi-val">${s.late}</div>
      <div class="kpi-sub">${s.blocked} bloquée(s) · ${deltaBadge(s.late,prev?.late,true)}</div></div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-head"><h2>Répartition par statut</h2><div class="spacer"></div>

      <div class="panel-head"><h2>Avancement par sous-projet</h2></div>
      <div class="panel-body"><div class="chart-box sm"><canvas id="cSP"></canvas></div></div>
    </div>

  <div class="panel">
    <div class="panel-head"><h2>Taux de clôture par sous-projet</h2><div class="spacer"></div>
      <span class="sub">% d'actions terminées</span></div>
    <div class="panel-body flush">
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Sous-projet</th><th>Total</th><th>Terminées</th><th>Bloquées</th><th>Retard</th><th style="min-width:200px">Clôture</th></tr></thead>
        <tbody>
        ${spRows.map(r=>`<tr>
          <td><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:${r.color};margin-right:8px"></span>${esc(r.sp)}</td>
          <td>${r.total}</td><td>${r.done}</td>
          <td>${r.blocked?`<span class="tag st-blocked"><span class="tag-dot"></span>${r.blocked}</span>`:"—"}</td>
          <td>${r.late?`<span class="alert-flag">⚠ ${r.late}</span>`:"—"}</td>
          <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${r.cl===100?'full':''}" style="width:${r.cl}%"></div></div><span class="prog-pct">${r.cl}%</span></div></td>
        </tr>`).join("")}
        </tbody>
      </table></div>
    </div>
  </div>

  ${s.late? `<div class="panel">
    <div class="panel-head"><h3 style="color:var(--rust)">⚠ ${s.late} action(s) en retard nécessitent une relance</h3>
      <div class="spacer"></div><button class="btn btn-ghost btn-sm" onclick="go('relances')">Voir les relances →</button></div>
    <div class="panel-body">
      ${s.lateList.slice(0,3).map(a=>`<div class="blocker-card" style="border-left-color:var(--rust)">

        <div class="bc-meta"><span>👤 ${esc(a.responsable||"—")}</span><span>📅 échéance ${fmtDate(effDue(a))}</span><span style="color:var(--rust);font-weight:600">${daysLate(a)} j de retard</span></div>
      </div></div>`).join("")}
    </div></div>`:""}

  ${s.noDue? `<div class="panel" style="border-left:3px solid var(--warn)">
    <div class="panel-head"><h3 style="color:var(--warn)">⚠ ${s.noDue} action(s) sans date de fin prévisionnelle</h3>
      <div class="spacer"></div><button class="btn btn-ghost btn-sm" onclick="go('relances')">Planifier →</button></div>

}
function after_dashboard(){
  const s=stats();
  drawDoughnut("cStatut",
    STATUTS, STATUTS.map(st=>actions().filter(a=>a.statut===st).length),
    STATUTS.map(st=>STATUT_COLOR[st]));
  const spMap=bySubProject();
  const labels=Object.keys(spMap).map(k=>k.length>22?k.slice(0,22)+"…":k);
  const data=Object.values(spMap).map(list=>Math.round(list.reduce((a,b)=>a+(+b.avancement||0),0)/list.length));
  drawBar("cSP",labels,data,Object.keys(spMap).map((_,i)=>SP_COLORS[i%SP_COLORS.length]));

function destroyChart(id){ if(UI.charts[id]){ UI.charts[id].destroy(); delete UI.charts[id]; } }
function drawDoughnut(id,labels,data,colors){
  const cv=$("#"+id); if(!cv) return; if(!LIB.chart){ chartFallback(cv); return; } destroyChart(id);
  UI.charts[id]=new Chart(cv,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#ffffff"}]},
    options:{cutout:"62%",plugins:{legend:{position:"bottom",labels:{font:{family:"Spline Sans",size:12},padding:14,usePointStyle:true,pointStyle:"circle"}}},maintainAspectRatio:false}});
}
function chartFallback(cv){
  const wrap=cv.parentNode;
  if(wrap && !wrap.querySelector(".chart-fallback")){
    const d=document.createElement("div");
    d.className="chart-fallback";
    d.style.cssText="display:flex;align-items:center;justify-content:center;height:100%;min-height:140px;color:#8a8275;font-size:13px;text-align:center;padding:16px";
    d.textContent="Graphique disponible avec une connexion Internet";
    cv.style.display="none"; wrap.appendChild(d);
  }
}
function drawBar(id,labels,data,colors){
  const cv=$("#"+id); if(!cv) return; if(!LIB.chart){ chartFallback(cv); return; } destroyChart(id);
  UI.charts[id]=new Chart(cv,{type:"bar",data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6,maxBarThickness:46}]},
    options:{indexAxis:"y",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x+"%"}}},
      scales:{x:{max:100,ticks:{callback:v=>v+"%",font:{family:"Spline Sans"}},grid:{color:"#e6e1d4"}},y:{ticks:{font:{family:"Spline Sans",size:11}},grid:{display:false}}},maintainAspectRatio:false}});
}

   VUE — Plan d'action
   ============================================================ */
function filteredActions(){
  const f=UI.filters;
  return actions().filter(a=>{
    if(f.q){ const q=f.q.toLowerCase(); if(!(a.description+a.sousProjet+a.responsable+(a.ref||"")+(a.commentaire||"")).toLowerCase().includes(q)) return false; }
    if(f.sp && a.sousProjet!==f.sp) return false;
    if(f.statut && a.statut!==f.statut) return false;
    if(f.resp && a.responsable!==f.resp) return false;
    if(f.lateOnly && !isLate(a)) return false;
    return true;
  });
}
function viewActions(){
  const f=UI.filters;
  const list=filteredActions();
  const sps=subProjectList(); const resps=responsableList();
  // group by sub-project preserving order
  const groups={}; list.forEach(a=>{ const k=a.sousProjet||"(Sans sous-projet)"; (groups[k]=groups[k]||[]).push(a); });

  const rows=Object.entries(groups).map(([sp,items],gi)=>{
    const head=`<tr class="sp-group"><td colspan="8">${esc(sp)}<span class="sp-count">${items.length} action(s)</span></td></tr>`;
    const body=items.map(a=>actionRow(a)).join("");
    return head+body;
  }).join("");

  return `
  <div class="filterbar">
    <div class="search-box"><span class="s-ico">⌕</span>
      <input type="text" placeholder="Rechercher une action, réf, responsable…" value="${esc(f.q)}" oninput="setFilter('q',this.value)">
    </div>
    <select class="fselect" onchange="setFilter('sp',this.value)">
      <option value="">Tous les sous-projets</option>
      ${sps.map(s=>`<option ${f.sp===s?'selected':''}>${esc(s)}</option>`).join("")}
    </select>
    <select class="fselect" onchange="setFilter('statut',this.value)">
      <option value="">Tous les statuts</option>
      ${STATUTS.map(s=>`<option ${f.statut===s?'selected':''}>${esc(s)}</option>`).join("")}
    </select>
    <select class="fselect" onchange="setFilter('resp',this.value)">
      <option value="">Tous responsables</option>
      ${resps.map(s=>`<option ${f.resp===s?'selected':''}>${esc(s)}</option>`).join("")}
    </select>
    <button class="chip-toggle ${f.lateOnly?'on':''}" onclick="setFilter('lateOnly',${!f.lateOnly})">⚠ Retards uniquement</button>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>Plan d'action</h2><div class="spacer"></div>
      <span class="sub">${list.length} / ${actions().length} actions affichées</span>
    </div>
    <div class="panel-body flush">
      ${list.length? `<div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th>Réf.</th><th>Action</th><th>Resp.</th><th>Priorité</th>
          <th>Échéance</th><th>Avancement</th><th>Statut</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`
      : `<div class="empty"><div class="e-ico">☰</div><h3>Aucune action ne correspond</h3>
         <p>Ajustez les filtres ou créez une nouvelle action pour ce projet.</p>
         <button class="btn btn-primary" onclick="openActionModal()">+ Nouvelle action</button></div>`}
    </div>
  </div>`;
}
function actionRow(a){
  const late=isLate(a);
  const due=effDue(a);
  const revised=a.dateFinRevisee && a.dateFinRevisee!==a.dateFinPlan;
  return `<tr class="${late?'late-row':''}">
    <td><span class="ref-chip">${esc(a.ref||"—")}</span></td>
    <td class="cell-desc">
      <div class="d-title">${esc(a.description)}</div>
      <div class="d-sp">${esc(a.type||"")} ${a.commentaire?`· <span style="opacity:.8">💬 ${esc(a.commentaire.slice(0,46))}${a.commentaire.length>46?"…":""}</span>`:""}</div>
    </td>
    <td style="white-space:nowrap">${esc(a.responsable||"—")}</td>
    <td><span class="prio prio-${esc(a.priorite)}">${esc(a.priorite||"—")}</span></td>
    <td style="white-space:nowrap">${late?`<span class="alert-flag" title="${daysLate(a)} jours de retard">⚠</span> `:""}<span style="${late?'color:var(--rust);font-weight:600':''}">${fmtDate(due)}</span>${revised?`<div style="font-size:10px;color:var(--ink-soft);text-decoration:line-through">${fmtDate(a.dateFinPlan)}</div>`:""}</td>
    <td><div class="prog-wrap" style="min-width:110px"><div class="prog-bar"><div class="prog-fill ${(+a.avancement||0)>=100?'full':''}" style="width:${+a.avancement||0}%"></div></div><span class="prog-pct">${+a.avancement||0}%</span></div></td>
    <td><span class="tag ${STATUT_CLASS[a.statut]}"><span class="tag-dot"></span>${esc(a.statut)}</span></td>
    <td><div class="row-actions">
      <button class="icon-btn" title="Modifier" onclick="openActionModal('${a.id}')">✎</button>
      <button class="icon-btn" title="Avancement rapide" onclick="quickProgress('${a.id}')">◐</button>
      <button class="icon-btn del" title="Supprimer" onclick="deleteAction('${a.id}')">🗑</button>
    </div></td>
  </tr>`;
}
function setFilter(k,v){ UI.filters[k]=v;
  // re-render only the view to keep input focus where possible
  if(k==="q"){ // keep typing smooth: just re-render view
    const sel=document.activeElement; const pos=sel&&sel.selectionStart;
    renderView();
    const inp=$("#view .search-box input"); if(inp){ inp.focus(); if(pos!=null) inp.setSelectionRange(pos,pos); }
  } else { renderView(); }
}

let MODAL_EDIT_ID=null;
function modalShell(inner){
  let ov=$("#modalOverlay");
  if(!ov){ ov=document.createElement("div"); ov.id="modalOverlay"; ov.className="modal-overlay";
    ov.onclick=e=>{ if(e.target===ov) closeModal(); }; document.body.appendChild(ov); }
  ov.innerHTML=inner; ov.classList.add("open");
  document.addEventListener("keydown",escClose);
}
function escClose(e){ if(e.key==="Escape") closeModal(); }
function closeModal(){ const ov=$("#modalOverlay"); if(ov){ ov.classList.remove("open"); ov.innerHTML=""; }
  document.removeEventListener("keydown",escClose); MODAL_EDIT_ID=null; }

function openActionModal(id){
  MODAL_EDIT_ID=id||null;
  const p=activeProject();
  const a=id? p.actions.find(x=>x.id===id) : {
    sousProjet:subProjectList()[0]||"",description:"",responsable:"",type:TYPES[1],priorite:"Moyenne",

      <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="form-row full"><label>Description de l'action <span class="req">*</span></label>
        <textarea id="m_desc" placeholder="Décrire l'action à mener…">${esc(a.description)}</textarea></div>

      <div class="form-row"><label>Type d'action</label>
        <select id="m_type">${TYPES.map(t=>`<option ${a.type===t?'selected':''}>${t}</option>`).join("")}</select></div>
      <div class="form-row"><label>Priorité</label>
        <select id="m_prio">${PRIORITES.map(t=>`<option ${a.priorite===t?'selected':''}>${t}</option>`).join("")}</select></div>

        <input type="number" id="m_charge" min="0" step="0.5" value="${a.charge||""}" placeholder="—"></div>

        <div class="range-row"><input type="range" id="m_av" min="0" max="100" step="5" value="${+a.avancement||0}"
          oninput="syncProgress(this.value)"><span class="range-val" id="m_avval2">${+a.avancement||0}%</span></div></div>
      <div class="form-row"><label>Statut</label>
        <select id="m_statut" onchange="onStatutChange(this.value)">${STATUTS.map(s=>`<option ${a.statut===s?'selected':''}>${s}</option>`).join("")}</select></div>
      <div class="form-row"><label>Livrables attendus</label>
        <input id="m_liv" value="${esc(a.livrables)}" placeholder="Note, procédure, cahier des charges…"></div>
      <div class="form-row full"><label>Commentaire / point de blocage</label>
        <textarea id="m_com" placeholder="Contexte, dépendances, blocages…">${esc(a.commentaire)}</textarea></div>
    </div></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveAction()">${id?"Enregistrer":"Créer l'action"}</button>
    </div>
  </div>`);
  setTimeout(()=>$("#m_desc")?.focus(),60);
}
function syncProgress(v){ $("#m_avval").textContent=v+"%"; $("#m_avval2").textContent=v+"%";
  // auto statut sync
  const sel=$("#m_statut");
  if(+v===100 && sel.value!=="Terminé"){ sel.value="Terminé"; }
  else if(+v>0 && +v<100 && sel.value==="À faire"){ sel.value="En cours"; }
}
function onStatutChange(v){ const r=$("#m_av");
  if(v==="Terminé"){ r.value=100; syncProgress(100); }
}
function saveAction(){
  const desc=$("#m_desc").value.trim();
  if(!desc){ toast("La description est obligatoire","warn"); $("#m_desc").focus(); return; }
  const p=activeProject();
  const data={ sousProjet:$("#m_sp").value.trim(), description:desc, responsable:$("#m_resp").value.trim(),
    type:$("#m_type").value, priorite:$("#m_prio").value, dateDebutPlan:$("#m_deb").value,
    dateFinPlan:$("#m_fin").value, dateFinRevisee:$("#m_rev").value, charge:$("#m_charge").value,
    avancement:+$("#m_av").value, statut:$("#m_statut").value, livrables:$("#m_liv").value.trim(),
    commentaire:$("#m_com").value.trim() };
  if(MODAL_EDIT_ID){
    const a=p.actions.find(x=>x.id===MODAL_EDIT_ID);
    a.history=a.history||[]; a.history.push({ts:Date.now(),av:a.avancement,statut:a.statut});
    Object.assign(a,data);
    toast("Action mise à jour");
  } else {
    const a={ id:uid(), ...data, autoRef:true, history:[] };
    p.actions.push(a); reindexRefs(p);
    toast("Action créée");
  }
  save(); closeModal(); render();
}
function quickProgress(id){
  const a=activeProject().actions.find(x=>x.id===id);
  const v=prompt(`Avancement de :\n${a.description.slice(0,80)}…\n\nNouvel avancement (0-100) :`, a.avancement);
  if(v===null) return;
  const n=Math.max(0,Math.min(100,parseInt(v)||0));
  a.history=a.history||[]; a.history.push({ts:Date.now(),av:a.avancement,statut:a.statut});
  a.avancement=n;
  if(n===100) a.statut="Terminé"; else if(n>0&&a.statut==="À faire") a.statut="En cours";
  save(); render(); toast("Avancement mis à jour : "+n+"%");
}
function deleteAction(id){
  const a=activeProject().actions.find(x=>x.id===id);
  if(!confirm(`Supprimer cette action ?\n\n${a.description.slice(0,100)}`)) return;
  const p=activeProject(); p.actions=p.actions.filter(x=>x.id!==id); reindexRefs(p);
  save(); render(); toast("Action supprimée","warn");
}

function saveProject(id){
  const name=$("#p_name").value.trim();
  if(!name){ toast("Le nom du projet est obligatoire","warn"); return; }
  const data={ name, client:$("#p_client").value.trim(), code:($("#p_code").value.trim()||"PRJ").toUpperCase(),
    version:$("#p_ver").value.trim()||"1.0", statut:$("#p_statut").value };
  if(id){ const p=DB.projects.find(x=>x.id===id); Object.assign(p,data); reindexRefs(p); toast("Projet mis à jour"); }
  else { const np={ id:uid(), ...data, createdAt:Date.now(), actions:[], snapshots:{}, comites:[] };
    DB.projects.push(np); DB.activeId=np.id; toast("Projet créé"); }
  save(); closeModal(); render();
}
function deleteProject(id){
  if(DB.projects.length<=1){ toast("Impossible de supprimer le dernier projet","warn"); return; }
  const p=DB.projects.find(x=>x.id===id);
  if(!confirm(`Supprimer le projet "${p.name}" et toutes ses actions ?`)) return;
  DB.projects=DB.projects.filter(x=>x.id!==id);
  if(DB.activeId===id) DB.activeId=DB.projects[0].id;
  save(); closeModal(); render(); toast("Projet supprimé","warn");
}


/* ============================================================
   VUE — Relances & retards
   ============================================================ */
function viewRelances(){
  const late=actions().filter(isLate).sort((a,b)=>daysLate(b)-daysLate(a));
  const blocked=actions().filter(a=>a.statut==="Bloqué");
  const noDue=actions().filter(noDueDate);
  const dueSoon=actions().filter(a=>{ const due=effDue(a); if(!due||a.statut==="Terminé"||isLate(a)) return false;
    const d=daysBetween(todayISO(),due); return d>=0&&d<=7; }).sort((a,b)=>daysBetween(todayISO(),effDue(a))-daysBetween(todayISO(),effDue(b)));

  return `
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi k-late"><div class="kpi-label">En retard</div><div class="kpi-val">${late.length}</div>
      <div class="kpi-sub">échéance dépassée, non terminées</div></div>
    <div class="kpi k-doing"><div class="kpi-label">Échéance ≤ 7 jours</div><div class="kpi-val">${dueSoon.length}</div>
      <div class="kpi-sub">à surveiller cette semaine</div></div>
    <div class="kpi" style="border-left:3px solid var(--warn)"><div class="kpi-label">Sans échéance</div><div class="kpi-val" style="color:var(--warn)">${noDue.length}</div>
      <div class="kpi-sub">date de fin non renseignée</div></div>
    <div class="kpi" style="border-left:3px solid var(--rust)"><div class="kpi-label">Bloquées</div><div class="kpi-val" style="color:var(--rust)">${blocked.length}</div>
      <div class="kpi-sub">nécessitent un arbitrage</div></div>
  </div>

  ${noDue.length?`<div class="panel">
    <div class="panel-head"><h2 style="color:var(--warn)">⚠ Actions sans date de fin prévisionnelle</h2><div class="spacer"></div>
      <span class="muted">${noDue.length} action${noDue.length>1?"s":""} à planifier</span></div>
    <div class="panel-body">
      <p style="color:var(--ink-soft);font-size:13px;margin-bottom:14px">Ces actions n'ont pas d'échéance : elles échappent au suivi des retards. Renseignez une date de fin planifiée pour les intégrer au pilotage.</p>
      ${noDue.map(a=>`<div class="blocker-card" style="border-left-color:var(--warn)">
        <span class="bc-ico" style="color:var(--warn)">⚠</span>
        <div class="bc-body">
          <div class="bc-title">${esc(a.description)}</div>
          <div class="bc-meta">
            <span class="ref-chip">${esc(a.ref||"")}</span>
            <span>👤 ${esc(a.responsable||"—")}</span>
            ${a.sousProjet?`<span>▪ ${esc(a.sousProjet)}</span>`:""}
            <span style="color:var(--warn);font-weight:600">⚠ Aucune échéance</span>
            <span>▸ ${+a.avancement||0}%</span>
          </div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="openActionModal('${a.id}')">📅 Planifier</button>
      </div>`).join("")}
    </div>
  </div>`:""}

  <div class="panel">
    <div class="panel-head"><h2 style="color:var(--rust)">⚑ Actions en retard</h2><div class="spacer"></div>
      ${late.length?`<button class="btn btn-primary btn-sm" onclick="copyAllReminders()">Copier toutes les relances</button>`:""}</div>
    <div class="panel-body">
      ${late.length? late.map(a=>relanceCard(a,"retard")).join("")
        : `<div class="empty" style="padding:30px"><div class="e-ico">✓</div><h3>Aucun retard 🎉</h3><p>Toutes les actions datées sont dans les temps.</p></div>`}
    </div>
  </div>

  ${dueSoon.length?`<div class="panel">
    <div class="panel-head"><h2>⏳ Échéances proches (7 jours)</h2></div>
    <div class="panel-body">${dueSoon.map(a=>relanceCard(a,"soon")).join("")}</div>
  </div>`:""}

  ${blocked.length?`<div class="panel">
    <div class="panel-head"><h2>⛔ Points de blocage</h2></div>
    <div class="panel-body">${blocked.map(a=>`<div class="blocker-card">
      <span class="bc-ico">⛔</span><div class="bc-body">
        <div class="bc-title">${esc(a.description)}</div>
        <div class="bc-meta"><span class="ref-chip">${esc(a.ref||"")}</span><span>👤 ${esc(a.responsable||"—")}</span>
          ${a.commentaire?`<span style="color:var(--rust)">💬 ${esc(a.commentaire)}</span>`:""}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="openActionModal('${a.id}')">Traiter</button>
    </div>`).join("")}</div>
  </div>`:""}
  `;
}
function relanceCard(a,kind){
  const d=kind==="retard"?daysLate(a):daysBetween(todayISO(),effDue(a));
  const color=kind==="retard"?"var(--rust)":"var(--gold)";
  return `<div class="blocker-card" style="border-left-color:${color}">
    <span class="bc-ico" style="color:${color}">${kind==="retard"?"⚑":"⏳"}</span>
    <div class="bc-body">
      <div class="bc-title">${esc(a.description)}</div>
      <div class="bc-meta">
        <span class="ref-chip">${esc(a.ref||"")}</span>
        <span>👤 ${esc(a.responsable||"—")}</span>
        <span>📅 ${fmtDate(effDue(a))}</span>
        <span style="color:${color};font-weight:600">${kind==="retard"?d+" j de retard":"dans "+d+" j"}</span>
        <span>▸ ${+a.avancement||0}%</span>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="copyReminder('${a.id}')" title="Copier un email de relance">✉ Relancer</button>
      <button class="btn btn-ghost btn-sm" onclick="openActionModal('${a.id}')">✎</button>
    </div>
  </div>`;
}
function reminderText(a){
  const p=activeProject();
  return `Objet : Relance — ${a.ref||"Action"} : ${a.description.slice(0,60)}

Bonjour ${a.responsable||""},

Dans le cadre du projet « ${p.name} », l'action suivante est en attente de votre part :

• Référence : ${a.ref||"—"}
• Action : ${a.description}
• Sous-projet : ${a.sousProjet||"—"}
• Échéance ${a.dateFinRevisee?"révisée":"planifiée"} : ${fmtDate(effDue(a))}${isLate(a)?` (en retard de ${daysLate(a)} jour(s))`:""}
• Avancement actuel : ${+a.avancement||0}%
${a.commentaire?`• Point d'attention : ${a.commentaire}\n`:""}
Pourriez-vous me communiquer un point d'avancement et, le cas échéant, les éventuels blocages ?

Bien cordialement,
${DB.settings.consultant||"Le PMO"}`;
}
function copyReminder(id){
  const a=actions().find(x=>x.id===id);
  copyToClipboard(reminderText(a));
  toast("Email de relance copié dans le presse-papier");
}
function copyAllReminders(){
  const late=actions().filter(isLate);
  if(!late.length){ toast("Aucun retard à relancer","warn"); return; }
  // group by responsable
  const byResp={}; late.forEach(a=>{ const r=a.responsable||"(non assigné)"; (byResp[r]=byResp[r]||[]).push(a); });
  const p=activeProject();
  let txt=`RELANCES — Projet « ${p.name} » — ${new Date().toLocaleDateString("fr-FR")}\n${"=".repeat(60)}\n\n`;
  Object.entries(byResp).forEach(([resp,list])=>{
    txt+=`▶ ${resp} (${list.length} action(s) en retard)\n`;
    list.forEach(a=>{ txt+=`   • [${a.ref}] ${a.description.slice(0,80)} — échéance ${fmtDate(effDue(a))}, retard ${daysLate(a)}j, ${a.avancement}%\n`; });
    txt+="\n";
  });
  copyToClipboard(txt);
  toast(`${late.length} relance(s) copiée(s), regroupées par responsable`);
}
function copyToClipboard(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");}catch(e){} ta.remove(); }

/* ============================================================
   VUE — Comparatif M vs M-1
   ============================================================ */
function viewComparatif(){
  const cur=stats();
  const curSnap=computeSnapshot(activeProject());
  const prev=getSnapshot(prevMonthKey());
  const mkLabel=new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const pmLabel=(()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); })();

  if(!prev){ return `<div class="empty"><div class="e-ico">⇅</div><h3>Pas encore de comparatif disponible</h3>
    <p>Le comparatif M vs M-1 se construit automatiquement : un instantané de votre projet est enregistré chaque mois. Revenez le mois prochain, ou créez un point de référence manuel pour démarrer.</p>
    <button class="btn btn-primary" onclick="createBaseline()">Créer un point de référence M-1</button></div>`; }

  const rows=[
    {k:"Actions terminées",cur:curSnap.done,prev:prev.done,suffix:""},
    {k:"Avancement moyen",cur:curSnap.avgProgress,prev:prev.avgProgress,suffix:"%"},
    {k:"Taux de clôture",cur:curSnap.closure,prev:prev.closure,suffix:"%"},
    {k:"Actions en cours",cur:curSnap.doing,prev:prev.doing,suffix:""},
    {k:"Actions en retard",cur:curSnap.late,prev:prev.late,suffix:"",invert:true},
    {k:"Actions bloquées",cur:curSnap.blocked,prev:prev.blocked,suffix:"",invert:true},
  ];

  return `
  <div class="panel">
    <div class="panel-head"><h2>Comparatif d'avancement</h2><div class="spacer"></div>
      <span class="sub">${pmLabel} → ${mkLabel}</span></div>
    <div class="panel-body flush"><div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Indicateur</th><th style="text-align:center">M-1<br><span style="font-weight:400;text-transform:none;letter-spacing:0">${esc(pmLabel)}</span></th>
        <th style="text-align:center">M (actuel)<br><span style="font-weight:400;text-transform:none;letter-spacing:0">${esc(mkLabel)}</span></th>
        <th style="text-align:center">Évolution</th><th style="min-width:160px">Tendance</th></tr></thead>
      <tbody>${rows.map(r=>{
        const d=r.cur-r.prev; const good=r.invert?d<=0:d>=0;
        const arrow=d>0?"▲":d<0?"▼":"→";
        const col=d===0?"var(--ink-soft)":good?"var(--ok)":"var(--rust)";
        const barCur=r.suffix==="%"?r.cur:Math.min(100,r.cur/Math.max(cur.total,1)*100);
        return `<tr>
          <td style="font-weight:500">${r.k}</td>
          <td style="text-align:center;font-variant-numeric:tabular-nums">${r.prev}${r.suffix}</td>
          <td style="text-align:center;font-weight:700;font-variant-numeric:tabular-nums">${r.cur}${r.suffix}</td>
          <td style="text-align:center;font-weight:700;color:${col}">${arrow} ${d>0?"+":""}${d}${r.suffix}</td>
          <td><div class="prog-bar"><div class="prog-fill" style="width:${barCur}%;background:${good?'linear-gradient(90deg,var(--forest-2),var(--sage))':'linear-gradient(90deg,var(--rust),var(--rust-soft))'}"></div></div></td>
        </tr>`; }).join("")}
      </tbody>
    </table></div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>Visualisation M-1 vs M</h2></div>
    <div class="panel-body"><div class="chart-box"><canvas id="cCompare"></canvas></div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h3>Synthèse PMO</h3></div>
    <div class="panel-body" style="font-size:13.5px;line-height:1.7;color:var(--ink-soft)">
      ${comparatifNarrative(curSnap,prev)}
    </div>
  </div>`;
}
function comparatifNarrative(cur,prev){
  const parts=[];
  const dClosure=cur.closure-prev.closure;
  const dDone=cur.done-prev.done;
  const dLate=cur.late-prev.late;
  if(dDone>0) parts.push(`<strong>${dDone} action(s) clôturée(s)</strong> depuis le mois dernier, portant le taux de clôture à <strong>${cur.closure}%</strong> (${dClosure>=0?"+":""}${dClosure} pts).`);
  else parts.push(`Aucune nouvelle clôture ce mois-ci ; le taux de clôture reste à <strong>${cur.closure}%</strong>.`);
  if(dLate>0) parts.push(`⚠️ Le nombre d'actions en retard a <strong style="color:var(--rust)">augmenté de ${dLate}</strong> — vigilance requise sur les relances.`);
  else if(dLate<0) parts.push(`✓ Les retards ont été <strong style="color:var(--ok)">réduits de ${-dLate}</strong>, signe d'un bon rattrapage.`);
  else parts.push(`Les retards sont stables (${cur.late}).`);
  const dProg=cur.avgProgress-prev.avgProgress;
  parts.push(`L'avancement moyen progresse de <strong>${dProg>=0?"+":""}${dProg} pts</strong> pour atteindre ${cur.avgProgress}%.`);
  return parts.map(p=>`<p style="margin-bottom:8px">• ${p}</p>`).join("");
}
function after_comparatif(){
  const prev=getSnapshot(prevMonthKey()); if(!prev) return;
  const cur=computeSnapshot(activeProject());
  const cv=$("#cCompare"); if(!cv) return; if(!LIB.chart){ chartFallback(cv); return; } destroyChart("cCompare");
  UI.charts["cCompare"]=new Chart(cv,{type:"bar",
    data:{labels:["Terminées","Avancement %","Clôture %","En cours","Retard","Bloquées"],
      datasets:[
        {label:"M-1",data:[prev.done,prev.avgProgress,prev.closure,prev.doing,prev.late,prev.blocked],backgroundColor:"#c8d4de",borderRadius:5},
        {label:"M (actuel)",data:[cur.done,cur.avgProgress,cur.closure,cur.doing,cur.late,cur.blocked],backgroundColor:"#13547E",borderRadius:5}]},
    options:{plugins:{legend:{position:"bottom",labels:{usePointStyle:true,font:{family:"Spline Sans"}}}},
      scales:{y:{grid:{color:"#e6e1d4"}},x:{grid:{display:false},ticks:{font:{family:"Spline Sans",size:11}}}},maintainAspectRatio:false}});
}
function createBaseline(){
  const p=activeProject();
  p.snapshots=p.snapshots||{};
  p.snapshots[prevMonthKey()]=computeSnapshot(p);
  save(); render(); toast("Point de référence M-1 créé à partir de l'état actuel");
}

let CR_PARSED=[];


/* ============================================================
   MODULE — REGISTRE DES DÉCISIONS
   Décisions issues de comités, formalisées et tracées
   (référence unique, date, décideur, instance, échéance, statut...)
   ============================================================ */

const DEC_STATUTS = ["Actée","En application","Appliquée","Suspendue","Annulée"];
const DEC_INSTANCES = ["Comité de pilotage","Comité projet","Comité technique","Arbitrage direction","Atelier","Réunion opérationnelle","Autre"];
const DEC_PORTEES = ["Stratégique","Organisationnelle","Budgétaire","Technique","Fonctionnelle","Contractuelle","RH"];

function ensureDecisions(p){ if(p && !Array.isArray(p.decisions)) p.decisions=[]; }

/* Numérotation DEC-AAAA-NNN par projet et par année */
function decNextRef(p){
  ensureDecisions(p);
  const year=new Date().getFullYear();
  const nums=p.decisions.map(d=>d.ref||"").filter(r=>r.startsWith(`DEC-${year}-`))
    .map(r=>parseInt(r.split("-")[2],10)||0);
  const next=(nums.length?Math.max(...nums):0)+1;
  return `DEC-${year}-${String(next).padStart(3,"0")}`;
}

function decFind(id){ const p=activeProject(); if(!p) return null; ensureDecisions(p); return p.decisions.find(d=>d.id===id)||null; }

/* ---------- Modal de saisie / édition d'une décision ---------- */

          <div class="field"><label>Responsable de l'application</label><input type="text" id="d_resp" value="${esc(d.responsableAppli||"")}"></div>
          <div class="field"><label>Échéance d'application</label><input type="date" id="d_ech" value="${esc(d.echeance||"")}"></div>

          <div class="field"><label>Réf. compte rendu source</label><input type="text" id="d_source" value="${esc(d.sourceCR||"")}" placeholder="Ex. CR-2026-004"></div>
          <div class="field cr-col-2"><label>Justification / motivation</label>

function saveDecision(){
  const p=activeProject(); if(!p) return;
  ensureDecisions(p);
  const objet=$("#d_objet").value.trim();
  if(!objet){ toast("L'objet de la décision est obligatoire","warn"); return; }
  const data={
    objet,
    description:$("#d_desc").value.trim(),
    instance:$("#d_instance").value,
    portee:$("#d_portee").value,
    decideur:$("#d_decideur").value.trim(),
    date:$("#d_date").value,
    responsableAppli:$("#d_resp").value.trim(),
    echeance:$("#d_ech").value,
    statut:$("#d_statut").value,
    sourceCR:$("#d_source").value.trim(),
    justification:$("#d_justif").value.trim(),
    alternatives:$("#d_alt").value.trim(),
    impact:$("#d_impact").value.trim(),
    commentaire:$("#d_comm").value.trim()
  };
  if(DEC_EDIT_ID){
    const d=decFind(DEC_EDIT_ID); if(d){ Object.assign(d,data); d.updatedAt=Date.now(); }
    toast("Décision mise à jour");
  } else {
    p.decisions.unshift(Object.assign({ id:"dec_"+Math.random().toString(36).slice(2,10), ref:decNextRef(p), createdAt:Date.now(), updatedAt:Date.now() }, data));
    toast("Décision ajoutée au registre");
  }
  save(); closeModal(); render();
}

function deleteDecision(id){
  const p=activeProject(); if(!p) return;
  const d=decFind(id); if(!d) return;
  if(!confirm(`Supprimer la décision ${d.ref} du registre ?\nCette action est irréversible.`)) return;
  p.decisions=p.decisions.filter(x=>x.id!==id);
  save(); closeModal(); render();
  toast("Décision supprimée");
}

/* ---------- Constantes & options du modèle ---------- */
const CR_TYPES = ["COPIL","COPROJ","Comité projet","Point d'avancement","Atelier","Cadrage","Autre"];
const CR_STATUTS_ACT = ["À faire","En cours","Terminé","En retard","Bloqué"];
const CR_IMPACTS = ["Faible","Moyen","Élevé","Critique"];
const CR_PROBAS  = ["Faible","Moyenne","Élevée"];
const CR_ROLES_DEFAUT = ["Sponsor","Directeur de projet","Chef de projet MOA","Chef de projet MOE","PMO","Référent métier","Architecte","Responsable qualité"];

/* ---------- Migration douce : s'assurer que tout projet possède les tableaux requis ---------- */
function ensureCRs(p){
  if(!p) return;
  if(!Array.isArray(p.crs)) p.crs = [];
  if(!Array.isArray(p.decisions)) p.decisions = [];
  // Workflow de validation : tout CR existant sans statut est considéré "brouillon"
  p.crs.forEach(cr=>{
    if(!cr.statut) cr.statut = "brouillon";
    if(!Array.isArray(cr.workflow)) cr.workflow = [];
    if(cr.transmis === undefined) cr.transmis = false;
  });
}

/* ---------- Numérotation auto CR-AAAA-NNN par projet et par année ---------- */
function crNextRef(p){
  ensureCRs(p);
  const year = new Date().getFullYear();
  const nums = p.crs
    .map(cr => cr.ref || "")
    .filter(r => r.startsWith(`CR-${year}-`))
    .map(r => parseInt(r.split("-")[2],10) || 0);
  const next = (nums.length ? Math.max(...nums) : 0) + 1;
  return `CR-${year}-${String(next).padStart(3,"0")}`;
}

function crFind(id){
  const p=activeProject(); if(!p) return null;
  ensureCRs(p);
  return p.crs.find(c=>c.id===id) || null;
}
function crCloseEdit(){ UI.crEditId=null; render(); }
function crDelete(id){
  const p=activeProject(); if(!p) return;
  const cr=crFind(id); if(!cr) return;
  if(!confirm(`Supprimer le compte rendu ${cr.ref} ?\nCette action est irréversible.`)) return;
  p.crs = p.crs.filter(c=>c.id!==id);
  save();
  if(UI.crEditId===id) UI.crEditId=null;
  render();
  toast("Compte rendu supprimé");
}
function crDuplicate(id){
  const p=activeProject(); if(!p) return;
  const cr=crFind(id); if(!cr) return;
  const copy=JSON.parse(JSON.stringify(cr));
  copy.id="cr_"+Math.random().toString(36).slice(2,10);
  copy.ref=crNextRef(p);
  copy.titre=(cr.titre||"")+" (copie)";
  copy.createdAt=Date.now(); copy.updatedAt=Date.now();
  p.crs.unshift(copy);
  save();
  UI.crEditId=copy.id;
  render();
  toast("Compte rendu dupliqué en "+copy.ref);
}

/* ---------- Setters génériques (champ direct, élément d'un tableau, ajout/suppression de ligne) ---------- */
function crSet(id,field,value){
  const cr=crFind(id); if(!cr) return;
  cr[field]=value; cr.updatedAt=Date.now();
  save();
}
function crSetCheckbox(id,field,checked){ crSet(id,field,!!checked); }
function crSetRow(id,arr,idx,field,value){
  const cr=crFind(id); if(!cr) return;
  if(!Array.isArray(cr[arr])) cr[arr]=[];
  if(!cr[arr][idx]) return;
  cr[arr][idx][field]=value; cr.updatedAt=Date.now();
  save();
}
function crSetRowCheck(id,arr,idx,field,checked){ crSetRow(id,arr,idx,field,!!checked); }
function crAddRow(id,arr,defaults){
  const cr=crFind(id); if(!cr) return;
  if(!Array.isArray(cr[arr])) cr[arr]=[];
  cr[arr].push(defaults||{});
  cr.updatedAt=Date.now();
  save(); render();
}
function crDelRow(id,arr,idx){
  const cr=crFind(id); if(!cr) return;
  if(!Array.isArray(cr[arr])) return;
  cr[arr].splice(idx,1); cr.updatedAt=Date.now();
  save(); render();
}
function crMoveRow(id,arr,idx,dir){
  const cr=crFind(id); if(!cr) return;
  const list=cr[arr]; if(!Array.isArray(list)) return;
  const j=idx+dir; if(j<0||j>=list.length) return;
  const t=list[idx]; list[idx]=list[j]; list[j]=t;
  cr.updatedAt=Date.now();
  save(); render();
}

/* Indicateur de remplissage : nombre de sections non vides (sur 11, hors signature qui est optionnelle) */
function crFilledSections(cr){
  let n=0;
  if(cr.titre || cr.animateur || cr.lieu) n++;
  if((cr.participants||[]).some(p=>p.nom)) n++;
  if(cr.ordre_du_jour) n++;
  if((cr.actions_precedentes||[]).length) n++;
  if((cr.points_evoques||[]).length) n++;
  if((cr.decisions||[]).length) n++;
  if((cr.actions||[]).length) n++;
  if((cr.suspens||[]).length) n++;
  if((cr.risques||[]).length) n++;
  if(cr.divers) n++;
  if(cr.valide_par || cr.diffusion) n++;
  return n;
}

/* Bandeau de workflow avec boutons de transition contextuels */
function crWorkflowBanner(cr){
  const st=cr.statut||"brouillon";
  const hist=(cr.workflow||[]).slice(-1)[0];
  let actions="", msg="";
  if(st==="brouillon"){
    msg="Ce compte rendu est en cours de rédaction. Une fois complet, soumettez-le à validation.";
    actions=`<button class="btn btn-primary btn-sm" onclick="crSubmit('${cr.id}')">Soumettre à validation →</button>`;
  } else if(st==="en_validation"){
    msg="Compte rendu soumis. Le valideur peut l'approuver ou le renvoyer pour correction.";
    actions=`<button class="btn btn-sm" style="background:#1F7A4D;color:#fff" onclick="crValidate('${cr.id}')">✓ Valider</button>
             <button class="btn btn-ghost btn-sm" style="color:var(--rust)" onclick="crReject('${cr.id}')">↩ Renvoyer pour correction</button>`;
  } else if(st==="valide"){
    msg="Compte rendu validé"+(cr.valide_par?` par ${esc(cr.valide_par)}`:"")+(hist&&hist.date?` le ${fmtDate((hist.date||"").slice(0,10))}`:"")+". Vous pouvez le diffuser et transmettre ses actions/décisions.";
    actions=`<button class="btn btn-primary btn-sm" onclick="openCRDispatchModal('${cr.id}')">↗ Transmettre actions / décisions</button>
             <button class="btn btn-ghost btn-sm" onclick="crReopen('${cr.id}')">Repasser en brouillon</button>`;
  } else if(st==="rejete"){
    msg="Renvoyé pour correction"+(hist&&hist.motif?` — motif : « ${esc(hist.motif)} »`:"")+". Apportez les rectifications puis soumettez à nouveau.";
    actions=`<button class="btn btn-primary btn-sm" onclick="crSubmit('${cr.id}')">Soumettre à nouveau →</button>`;
  }
  const colMap={brouillon:"#8a8d95",en_validation:"#B8893D",valide:"#1F7A4D",rejete:"#B3361F"};
  const col=colMap[st]||"#8a8d95";
  return `<div class="cr-wf-banner" style="border-left:4px solid ${col}">
    <div class="cr-wf-msg">${msg}</div>
    <div class="cr-wf-actions">${actions}</div>
  </div>`;
}

/* ---------- Synchronisation des actions CR vers le plan d'action global ---------- */
function crPushActionsToPlan(crId){
  const p=activeProject(); const cr=crFind(crId); if(!cr||!p) return;
  const lines=(cr.actions||[]).filter(a=>a.description);
  if(!lines.length){ toast("Aucune action à transmettre","warn"); return; }
  if(!confirm(`Ajouter ${lines.length} action(s) du CR ${cr.ref} au plan d'action global du projet ?`)) return;
  let added=0;
  lines.forEach(a=>{
    p.actions.push({
      id:"a_"+Math.random().toString(36).slice(2,10),
      sousProjet:"",
      description:a.description,
      responsable:a.responsable||"",
      type:"📊 Reporting",
      priorite:"Moyenne",
      dateDebutPlan:todayISO(),
      dateFinPlan:a.echeance||"",
      dateFinRevisee:"",
      charge:0,
      avancement:a.statut==="Terminé"?100:(a.statut==="En cours"?30:0),
      statut:a.statut||"À faire",
      livrables:"",
      commentaire:`Issu du CR ${cr.ref} — ${a.commentaire||""}`,
      autoRef:true,
      history:[]
    });
    added++;
  });
  reindexRefs(p);
  save();
  toast(`${added} action(s) ajoutée(s) au plan d'action`);
}


/* ============================================================
   MODULE — WORKFLOW DE VALIDATION DES COMPTES RENDUS
   Brouillon → En validation → Validé / À rectifier
   + génération du mail de diffusion
   + transmission sélective vers plan d'action / registre décisions
   ============================================================ */

function crLog(cr, statut, extra){
  if(!Array.isArray(cr.workflow)) cr.workflow=[];
  cr.workflow.push(Object.assign({ statut, date:new Date().toISOString(), par:(DB.settings&&DB.settings.consultant)||"" }, extra||{}));
}

function crSubmit(id){
  const cr=crFind(id); if(!cr) return;
  // Contrôle minimal : titre + au moins une section de contenu
  if(!cr.titre){ toast("Renseignez au moins le titre de la réunion avant de soumettre","warn"); return; }
  cr.statut="en_validation"; cr.updatedAt=Date.now();
  crLog(cr,"en_validation");
  save(); render();
  toast("Compte rendu soumis à validation");
}

function crValidate(id){
  const cr=crFind(id); if(!cr) return;
  const valideur = prompt("Nom du valideur (animateur / responsable) :", cr.valide_par || (DB.settings&&DB.settings.consultant) || "");
  if(valideur===null) return; // annulé
  cr.valide_par = valideur.trim();
  cr.statut="valide"; cr.updatedAt=Date.now();
  crLog(cr,"valide",{par:valideur.trim()});
  save(); render();
  toast("Compte rendu validé ✓");
  // Proposer directement le mail de diffusion
  setTimeout(()=>openCRMailModal(id), 350);
}

function crReject(id){
  const cr=crFind(id); if(!cr) return;
  const motif = prompt("Motif du renvoi pour correction (précisez ce qui doit être rectifié) :", "");
  if(motif===null) return;
  cr.statut="rejete"; cr.updatedAt=Date.now();
  crLog(cr,"rejete",{motif:(motif||"").trim()});
  save(); render();
  toast("Compte rendu renvoyé pour correction","warn");
}

function crReopen(id){

/* ---------- Génération du mail de diffusion ---------- */
function crMailBody(cr){
  const p=activeProject();
  const dateStr = cr.date ? fmtDate(cr.date) : "";
  const typeLbl = cr.type ? cr.type : "réunion";
  const objet = `Compte rendu ${cr.ref} — ${cr.titre||typeLbl}${dateStr?` du ${dateStr}`:""}`;

  // Destinataires : participants avec diffusion cochée + ceux présents
  const dests = (cr.participants||[]).filter(x=>x.nom && (x.diffusion||x.present)).map(x=>x.nom);
  const destLine = dests.length ? dests.join(", ") : "";

  // Synthèse rapide : nb décisions / actions
  const nbDec=(cr.decisions||[]).length, nbAct=(cr.actions||[]).length;
  let recap="";
  if(nbDec||nbAct){
    const parts=[];
    if(nbDec) parts.push(`${nbDec} décision${nbDec>1?"s":""}`);
    if(nbAct) parts.push(`${nbAct} action${nbAct>1?"s":""}`);
    recap = `\n\nCe compte rendu formalise ${parts.join(" et ")} issues de la séance.`;
  }

  const body = `Bonjour${destLine?` ${destLine}`:""},

Je vous prie de bien vouloir trouver ci-joint le compte rendu de ${typeLbl==="réunion"?"la réunion":`« ${typeLbl} »`}${cr.titre?` relatif à « ${cr.titre} »`:""}${dateStr?`, qui s'est tenue le ${dateStr}`:""}.${recap}

Je reste à votre disposition pour toute précision ou remarque, et vous remercie de me faire part de vos éventuels retours.

Bien cordialement,
${(DB.settings&&DB.settings.consultant)||cr.redacteur||"Le PMO"}
${p?p.name:""}`;

  return { objet, body, destLine };
}

    <tr>

      <td>${esc(a.description)}</td>
      <td>${esc(a.responsable||"—")}</td>

        ${acts.length?`
        <div class="disp-block">

          <table class="tbl cr-tbl">
            <thead><tr><th style="width:44px"></th><th>Action</th><th style="width:140px">Responsable</th><th style="width:120px">Échéance</th></tr></thead>

        <label style="display:flex;align-items:center;gap:8px;margin-top:16px;font-size:13px;color:var(--ink-soft)">
          <input type="checkbox" id="disp-complete" checked> Ouvrir chaque élément transmis pour compléter les informations
        </label>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="crDispatchConfirm('${cr.id}')">Transmettre la sélection</button>
