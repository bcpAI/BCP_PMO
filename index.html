    </div>`);
}

function crDispToggleAll(kind,checked){
  document.querySelectorAll(kind==="act"?".disp-act":".disp-dec").forEach(cb=>cb.checked=checked);
}

function crDispatchConfirm(id){
  const p=activeProject(); const cr=crFind(id); if(!cr||!p) return;
  ensureDecisions(p);
  const acts=(cr.actions||[]).filter(a=>a.description);
  const decs=(cr.decisions||[]).filter(d=>d.decision);
  const complete = $("#disp-complete") ? $("#disp-complete").checked : false;

  const selAct=[...document.querySelectorAll(".disp-act:checked")].map(cb=>+cb.dataset.idx);
  const selDec=[...document.querySelectorAll(".disp-dec:checked")].map(cb=>+cb.dataset.idx);

  if(!selAct.length && !selDec.length){ toast("Aucun élément sélectionné","warn"); return; }

  let addedA=0, addedD=0;
  const newActionIds=[], newDecIds=[];

  // Actions -> plan d'action
  selAct.forEach(i=>{
    const a=acts[i]; if(!a) return;
    const nid="a_"+Math.random().toString(36).slice(2,10);
    p.actions.push({
      id:nid, sousProjet:"", description:a.description, responsable:a.responsable||"",
      type:"📊 Reporting", priorite:"Moyenne",
      dateDebutPlan:todayISO(), dateFinPlan:a.echeance||"", dateFinRevisee:"",
      charge:"", avancement: a.statut==="Terminé"?100:(a.statut==="En cours"?30:0),
      statut:a.statut||"À faire", livrables:"",
      commentaire:`Issu du CR ${cr.ref}${a.commentaire?" — "+a.commentaire:""}`,
      autoRef:true, history:[]
    });
    newActionIds.push(nid); addedA++;
  });
  if(addedA) reindexRefs(p);

  // Décisions -> registre
  selDec.forEach(i=>{
    const d=decs[i]; if(!d) return;
    const nid="dec_"+Math.random().toString(36).slice(2,10);
    p.decisions.unshift({
      id:nid, ref:decNextRef(p),
      objet:(d.decision||"").slice(0,80),
      description:d.decision||"",
      instance: cr.type==="COPIL"?"Comité de pilotage":(cr.type==="COPROJ"||cr.type==="Comité projet"?"Comité projet":"Autre"),
      portee:"Organisationnelle",
      decideur:d.decideur||"", date:d.date||cr.date||todayISO(),
      responsableAppli:"", echeance:"", statut:"Actée",
      justification:d.justification||"", alternatives:"", impact:"",
      sourceCR:cr.ref, commentaire:"",
      createdAt:Date.now(), updatedAt:Date.now()
    });
    newDecIds.push(nid); addedD++;
  });

  cr.transmis=true; cr.updatedAt=Date.now();
  save(); closeModal();

  const parts=[];
  if(addedA) parts.push(`${addedA} action(s) → plan d'action`);
  if(addedD) parts.push(`${addedD} décision(s) → registre`);
  toast(parts.join("  ·  "));

  // Complétion guidée : ouvrir successivement les nouveaux éléments
  if(complete){
    if(newDecIds.length){
      // ouvrir la première décision pour complément
      UI.view="decisions"; render();
      setTimeout(()=>openDecisionModal(newDecIds[0]), 300);
    } else if(newActionIds.length){
      UI.view="actions"; render();
      setTimeout(()=>openActionModal(newActionIds[0]), 300);
    } else render();
  } else {
    render();
  }
}


/* ============================================================
   GÉNÉRATION DU FICHIER WORD (.docx) — fidèle au modèle PMO
   En-tête : "Compte rendu de réunion — PMO  /  Confidentiel"
   Pied    : "Business Consulting Partners  /  Page X / Y"
   Couleur header tableau : bleu BCP #13547E
   ============================================================ */
async function exportCRWord(crId){
  if(!LIB.docx){ toast("Export Word indisponible (connexion requise au CDN)","warn"); return; }
  const p=activeProject(); const cr=crFind(crId); if(!cr||!p){ toast("Compte rendu introuvable","warn"); return; }

  const d=window.docx;
  const {
    Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
    AlignmentType,HeadingLevel,BorderStyle,WidthType,ShadingType,
    VerticalAlign,Header,Footer,PageNumber,TabStopType
  } = d;

  const BLUE="13547E", BLUE_DARK="0E3F5E", SUBFILL="DBE8EF", LIGHT="EEF3F6", GREY="C8D0D8", INK="40444D", INKSOFT="6B6F78";

  const thin = { style: BorderStyle.SINGLE, size: 4, color: GREY };
  const cellBorders = { top: thin, bottom: thin, left: thin, right: thin };
  const cellMargins = { top: 80, bottom: 80, left: 120, right: 120 };
  const CW = 9360; // largeur de contenu utile en twips

  const T = (text, opts={}) => new TextRun({ text: String(text==null?"":text), size: opts.size||20, color: opts.color||INK, bold:!!opts.bold, italics:!!opts.italics, font: opts.font||"Calibri" });

  const Para = (children, opts={}) => new Paragraph({
    children: Array.isArray(children)?children:[children],
    alignment: opts.align||AlignmentType.LEFT,
    spacing: { before: opts.before||0, after: opts.after||80 },
    heading: opts.heading
  });

  function headerCell(text, w){
    return new TableCell({
      borders:cellBorders, width:{size:w,type:WidthType.DXA},
      shading:{fill:BLUE,type:ShadingType.CLEAR},
      margins:cellMargins, verticalAlign:VerticalAlign.CENTER,
      children:[ new Paragraph({ children:[T(text,{bold:true,color:"FFFFFF",size:20})] }) ]
    });
  }
  function cell(text, w, opts={}){
    const items = Array.isArray(text) ? text : [text];
    const children = items.map(t=>{
      if(typeof t==="string") return new Paragraph({ children:[T(t,{size:opts.fontSize||19,color:opts.color||INK,bold:!!opts.bold})], alignment: opts.align||AlignmentType.LEFT });
      return t;
    });
    return new TableCell({
      borders:cellBorders, width:{size:w,type:WidthType.DXA},
      shading: opts.fill ? {fill:opts.fill,type:ShadingType.CLEAR} : undefined,
      margins:cellMargins, verticalAlign:VerticalAlign.CENTER, children
    });
  }
  function makeTable(rows){ return new Table({ rows, width:{size:CW,type:WidthType.DXA} }); }

  function sectionTitle(n,label){
    return new Paragraph({
      spacing:{before:240,after:120},
      border:{bottom:{style:BorderStyle.SINGLE,size:8,color:BLUE,space:4}},
      children:[
        T(`${n}. `,{bold:true,size:28,color:BLUE}),
        T(label,{bold:true,size:28,color:INK})
      ]
    });
  }

  const children = [];

  /* Bandeau de titre principal */
  children.push(new Paragraph({
    spacing:{after:60},
    children:[ T("BUSINESS CONSULTING PARTNERS",{bold:true,color:BLUE,size:18}) ]
  }));
  children.push(new Paragraph({
    spacing:{after:120},
    children:[ T(`Référence : ${cr.ref}`,{color:INKSOFT,size:18}), T("    ·    ",{color:INKSOFT,size:18}), T(`Projet : ${p.name}`,{color:INKSOFT,size:18}) ]
  }));
  children.push(new Paragraph({
    spacing:{after:120},
    children:[ T(cr.titre||"Compte rendu de réunion",{bold:true,size:36,color:INK}) ]
  }));
  // Bandeau de statut de validation
  (function(){
    const st=cr.statut||"brouillon";
    const map={
      brouillon:{txt:"DOCUMENT DE TRAVAIL — NON VALIDÉ",col:"8A8D95"},
      en_validation:{txt:"EN COURS DE VALIDATION",col:"B8893D"},
      valide:{txt:"COMPTE RENDU VALIDÉ"+(cr.valide_par?` — ${cr.valide_par}`:""),col:"1F7A4D"},
      rejete:{txt:"À RECTIFIER — RENVOYÉ POUR CORRECTION",col:"B3361F"}
    };
    const info=map[st]||map.brouillon;
    children.push(new Paragraph({
      spacing:{after:180},
      children:[ T("● ",{color:info.col,size:18}), T(info.txt,{bold:true,color:info.col,size:16}) ]
    }));
  })();

  /* Section 1 : Informations générales (deux colonnes) */
  children.push(sectionTitle(1,"Informations générales"));
  const dureeStr = (cr.heure_debut&&cr.heure_fin)? `${cr.heure_debut} – ${cr.heure_fin}` : (cr.heure_debut||cr.heure_fin||"—");
  const lab = (k,v) => new TableRow({ children:[
    cell(k, 2880, {fill:LIGHT,bold:true,color:BLUE_DARK}),
    cell(v||"—", CW-2880)
  ]});
  children.push(makeTable([
    lab("Projet / Programme", p.name),
    lab("Titre de la réunion", cr.titre),
    lab("Type", cr.type),
    lab("Date", fmtDate(cr.date)),
    lab("Horaire", dureeStr),
    lab("Lieu / Lien visio", cr.lieu),
    lab("Animateur", cr.animateur),
    lab("Rédacteur", cr.redacteur),
    lab("Prochaine réunion", cr.prochaine_reunion)
  ]));

  /* Section 2 : Participants */
  children.push(sectionTitle(2,"Participants"));
  const partHead = new TableRow({ children:[
    headerCell("Nom",2400), headerCell("Rôle / Entité",3200),
    headerCell("Présent",1120), headerCell("Excusé",1120), headerCell("Diffusion",1520)
  ]});
  const partRows = (cr.participants||[]).filter(x=>x.nom||x.role).map((p2,i)=>new TableRow({ children:[
    cell(p2.nom||"",2400,{fill: i%2?LIGHT:undefined}),
    cell(p2.role||"",3200,{fill: i%2?LIGHT:undefined}),
    cell(p2.present?"☒":"☐",1120,{align:AlignmentType.CENTER, fill: i%2?LIGHT:undefined}),

    cell(p2.diffusion?"☒":"☐",1520,{align:AlignmentType.CENTER, fill: i%2?LIGHT:undefined})
  ]}));
  children.push(makeTable([partHead, ...(partRows.length?partRows:[new TableRow({children:[cell("—",CW)]})])]));

  /* Section 3 : Ordre du jour */
  children.push(sectionTitle(3,"Ordre du jour"));
  const odjLines=(cr.ordre_du_jour||"").split(/\r?\n/).filter(l=>l.trim());
  if(odjLines.length){
    odjLines.forEach(l=>children.push(new Paragraph({ children:[T("• "+l.replace(/^[•▸–-]\s*/,""))], spacing:{after:60} })));
  } else children.push(new Paragraph({ children:[T("—",{color:INKSOFT})] }));

  /* Section 4 : Suivi actions précédentes */
  children.push(sectionTitle(4,"Suivi des actions précédentes"));
  const a4h=new TableRow({children:[headerCell("Réf.",1120),headerCell("Action",3600),headerCell("Responsable",1800),headerCell("Statut",1200),headerCell("Commentaire",1640)]});
  const a4r=(cr.actions_precedentes||[]).map((a,i)=>new TableRow({children:[

    cell(a.description||"",3600,{fill:i%2?LIGHT:undefined}),
    cell(a.responsable||"",1800,{fill:i%2?LIGHT:undefined}),
    cell(a.statut||"",1200,{fill:i%2?LIGHT:undefined,bold:true,color:a.statut==="Terminé"?"1F7A4D":(a.statut==="Bloqué"||a.statut==="En retard"?"B3361F":INK)}),
    cell(a.commentaire||"",1640,{fill:i%2?LIGHT:undefined})
  ]}));
  children.push(makeTable([a4h,...(a4r.length?a4r:[new TableRow({children:[cell("Aucune action en suivi",CW,{color:INKSOFT,align:AlignmentType.CENTER})]})])]));

  /* Section 5 : Points évoqués */

    cell(pe.synthese||"",CW-640-2880,{fill:i%2?LIGHT:undefined})
  ]}));
  children.push(makeTable([a5h,...(a5r.length?a5r:[new TableRow({children:[cell("—",CW,{color:INKSOFT,align:AlignmentType.CENTER})]})])]));

  const a6r=(cr.decisions||[]).map((dec,i)=>new TableRow({children:[
    cell(dec.ref||"",1120,{fill:i%2?LIGHT:undefined,bold:true,color:BLUE}),
    cell(dec.decision||"",3200,{fill:i%2?LIGHT:undefined}),
    cell(dec.justification||"",2400,{fill:i%2?LIGHT:undefined,color:INKSOFT}),
    cell(dec.decideur||"",1440,{fill:i%2?LIGHT:undefined}),

  ]}));
  children.push(makeTable([a6h,...(a6r.length?a6r:[new TableRow({children:[cell("Aucune décision actée",CW,{color:INKSOFT,align:AlignmentType.CENTER})]})])]));

  /* Section 7 : Plan d'actions */
  children.push(sectionTitle(7,"Plan d'actions"));
  const a7h=new TableRow({children:[headerCell("Réf.",1120),headerCell("Action",2800),headerCell("Responsable",1600),headerCell("Échéance",1200),headerCell("Statut",1200),headerCell("Commentaire",1440)]});

function parseCR(){
  const text=$("#cr_text").value;
  if(!text.trim()){ toast("Collez d'abord un compte rendu","warn"); return; }
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const actionVerbs=/\b(d[ée]finir|formaliser|analyser|diagnostiquer|mettre en place|proposer|[ée]laborer|cartographier|finaliser|valider|r[ée]diger|pr[ée]parer|structurer|identifier|recueillir|coordonner|d[ée]velopper|param[ée]trer|cadrer|r[ée]aliser|lancer|s'assurer|assurer|cr[ée]er|traiter|suivre|relancer|planifier|organiser|pr[ée]senter|documenter|construire|d[ée]ployer)\b/i;
  const detected=[];
  lines.forEach(raw=>{
    let l=raw.replace(/^[-•*▪◦·o]\s*/,"").replace(/^\d+[.)]\s*/,"").replace(/^action\s*:?\s*/i,"").trim();
    if(l.length<8) return;
    const isBullet=/^[-•*▪◦·]/.test(raw)||/^\d+[.)]/.test(raw)||/^action/i.test(raw);
    if(!isBullet && !actionVerbs.test(l)) return;
    // detect responsable
    let resp=""; const respM=l.match(/\b(resp(?:onsable)?\.?\s*:?\s*)([A-ZÉÈ][\wÀ-ÿ' ]{1,28})/i)||l.match(/^([A-ZÉÈ]{2,6})\s+(?:doit|va|devra|s'engage)/);
    if(respM) resp=(respM[2]||respM[1]).trim().replace(/[,;.].*$/,"");
    // detect date
    let due=""; const dM=l.match(/(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?/);
    if(dM){ let[_,dd,mm,yy]=dM; yy=yy||new Date().getFullYear(); if(yy.length===2) yy="20"+yy;
      due=`${yy}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`; }
    const echM=l.match(/[ée]ch[ée]ance\s*:?\s*(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?/i);
    if(echM){ let[_,dd,mm,yy]=echM; yy=yy||new Date().getFullYear(); if(yy.length===2) yy="20"+yy;
      due=`${yy}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`; }
    // clean description (remove resp/date fragments)
    let desc=l.replace(/\(?\s*resp(?:onsable)?\.?\s*:?\s*[A-ZÉÈ][\wÀ-ÿ' ]{1,28}\s*,?/i,"")
              .replace(/[,;]?\s*[ée]ch[ée]ance\s*:?\s*\d{1,2}[\/\-.]\d{1,2}(?:[\/\-.]\d{2,4})?/i,"")
              .replace(/\bpour le\s+\d{1,2}[\/\-.]\d{1,2}(?:[\/\-.]\d{2,4})?/i,"")
              .replace(/[\(\)]/g,"").replace(/\s{2,}/g," ").replace(/[,;.\s]+$/,"").trim();
    desc=desc.charAt(0).toUpperCase()+desc.slice(1);
    // priority heuristic
    let prio="Moyenne"; if(/urgent|prioritaire|critique|sensible|imp[ée]ratif/i.test(raw)) prio="Haute";
    detected.push({sel:true,description:desc,responsable:resp,dateFinPlan:due,priorite:prio,
      sousProjet:"",type:guessType(desc)});
  });
  CR_PARSED=detected;
  renderCRResults();
}
function guessType(d){
  if(/analys|diagnostic|[ée]tude|cartograph/i.test(d)) return "🔍 Analyse";
  if(/d[ée]velopp|param[ée]tr|d[ée]ploi|impl[ée]ment/i.test(d)) return "⚙️ Développement";
  if(/cadr|p[ée]rim[èe]tr|gouvernance/i.test(d)) return "🔷 Cadrage";
  if(/report|tableau de bord|suivi|indicateur/i.test(d)) return "📊 Reporting";
  return "✏️ Conception";
}
function renderCRResults(){

  if(!CR_PARSED.length){ box.innerHTML=`<div class="panel"><div class="panel-body"><div class="empty" style="padding:30px"><div class="e-ico">🔍</div><h3>Aucune action détectée</h3><p>Essayez d'utiliser des puces (- ou •), le mot « Action : », ou des verbes d'action (définir, analyser, formaliser…).</p></div></div></div>`; return; }

function comiteStat(val,label,delta,pct,invert){
  let d="";
  if(delta!=null && delta!==0){ const up=delta>0; const good=invert?!up:up;

  return `<div><div style="font-family:'Inter',system-ui,sans-serif;font-size:30px;font-weight:600;line-height:1">${val}${d}</div>
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-top:3px">${label}</div></div>`;
}
function renderGantt(){
  const acts=actions().filter(a=>a.dateDebutPlan||a.dateFinPlan);
  if(!acts.length) return `<div style="color:var(--ink-soft);text-align:center;padding:14px">Renseignez les dates des actions pour afficher la roadmap.</div>`;
  let min=Infinity,max=-Infinity;
  acts.forEach(a=>{ const s=a.dateDebutPlan||a.dateFinPlan, e=effDue(a)||a.dateDebutPlan;
    if(s) min=Math.min(min,new Date(s+"T00:00:00").getTime());
    if(e) max=Math.max(max,new Date(e+"T00:00:00").getTime()); });
  if(!isFinite(min)) return "";
  const start=new Date(min); start.setDate(start.getDate()-start.getDay()+1); // lundi
  const weeks=Math.max(4,Math.ceil((max-start.getTime())/(7*864e5))+1);
  const cols=[]; for(let i=0;i<weeks;i++){ const d=new Date(start); d.setDate(d.getDate()+i*7); cols.push(d); }
  const sps=subProjectList();
  const spColor=Object.fromEntries(sps.map((s,i)=>[s,SP_COLORS[i%SP_COLORS.length]]));
  const head=`<tr><th class="lab">Action</th>${cols.map(c=>`<th>S${String(c.getDate()).padStart(2,"0")}/${String(c.getMonth()+1).padStart(2,"0")}</th>`).join("")}</tr>`;
  const rows=acts.map(a=>{
    const s=new Date((a.dateDebutPlan||a.dateFinPlan)+"T00:00:00").getTime();
    const e=new Date((effDue(a)||a.dateDebutPlan)+"T00:00:00").getTime();
    const startW=Math.max(0,Math.floor((s-start.getTime())/(7*864e5)));
    const endW=Math.max(startW,Math.floor((e-start.getTime())/(7*864e5)));
    const late=isLate(a);
    const cells=cols.map((c,i)=>{
      if(i<startW||i>endW) return `<td></td>`;
      const isStart=i===startW, isEnd=i===endW;
      const radius=isStart&&isEnd?"5px":isStart?"5px 0 0 5px":isEnd?"0 5px 5px 0":"0";
      return `<td><div class="gbar ${late&&isEnd?'late':''}" style="border-radius:${radius}"><div class="gfill" style="background:${spColor[a.sousProjet]||'#13547E'};border-radius:${radius};width:${isEnd?(+a.avancement||0)+"%":"100%"}"></div></div></td>`;
    }).join("");
    return `<tr><td class="lab"><span class="gref">${esc(a.ref)}</span> ${esc(a.description.slice(0,42))}${a.description.length>42?"…":""}</td>${cells}</tr>`;
  }).join("");
  const legend=`<div class="legend" style="margin-top:14px">${sps.map((s,i)=>`<span class="li"><span class="sw" style="background:${SP_COLORS[i%SP_COLORS.length]}"></span>${esc(s.length>20?s.slice(0,20)+"…":s)}</span>`).join("")}<span class="li"><span class="sw" style="background:#fff;outline:2px solid var(--rust)"></span>Action en retard</span></div>`;
  return `<div class="gantt-wrap"><table class="gantt">${head}${rows}</table></div>${legend}`;
}

  kpis.forEach((k,i)=>{ const x=14+i*kw;
    doc.setDrawColor(217,211,196); doc.setFillColor(251,250,246); doc.roundedRect(x,y,kw-5,22,2,2,"FD");
    doc.setTextColor(...soft); doc.setFontSize(8); doc.setFont("helvetica","normal");
    doc.text(String(k[0]).toUpperCase(),x+4,y+6);
    doc.setTextColor(...(k[0]==="En retard"?rust:ink)); doc.setFont("helvetica","bold"); doc.setFontSize(16);
    doc.text(String(k[1]),x+4,y+16);
    if(k[2]!=null&&k[2]!==0){ doc.setFontSize(8); doc.setTextColor(...(k[2]>0?forest:rust));
      doc.text((k[2]>0?"+":"")+k[2]+" vs M-1",x+4,y+20.5); }
  });
  y+=30;
  // Sub-project table
  doc.setTextColor(...forest); doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("1. Avancement par sous-projet",14,y); y+=2;
  const spMap=bySubProject();
  const spBody=Object.entries(spMap).map(([sp,l])=>{ const done=l.filter(a=>a.statut==="Terminé").length;
    return [sp,l.length,done,l.filter(a=>a.statut==="En cours").length,l.filter(a=>a.statut==="Bloqué").length,
      l.filter(isLate).length,Math.round(done/l.length*100)+"%"]; });
  doc.autoTable({ startY:y+3, head:[["Sous-projet","Total","Terminé","En cours","Bloqué","Retard","Clôture"]], body:spBody,
    theme:"grid", headStyles:{fillColor:forest,fontSize:9,halign:"center"}, bodyStyles:{fontSize:9},
    columnStyles:{0:{cellWidth:90},1:{halign:"center"},2:{halign:"center"},3:{halign:"center"},4:{halign:"center"},5:{halign:"center"},6:{halign:"center",fontStyle:"bold"}},
    margin:{left:14,right:14} });
  y=doc.lastAutoTable.finalY+10;
  // Blockers
  const blockers=actions().filter(a=>a.statut==="Bloqué");
  const late=actions().filter(isLate).sort((a,b)=>daysLate(b)-daysLate(a));
  if(y>165){ doc.addPage("a4","landscape"); y=18; }
  doc.setTextColor(...rust); doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("2. Points de blocage & alertes PMO",14,y);
  doc.autoTable({ startY:y+4,
    head:[["Réf.","Action","Responsable","Statut","Échéance","Détail"]],
    body:[...blockers.map(a=>[a.ref,a.description,a.responsable||"—","Bloqué",fmtDate(effDue(a)),(a.commentaire||"").slice(0,60)]),
          ...late.slice(0,8).map(a=>[a.ref,a.description,a.responsable||"—",`Retard ${daysLate(a)}j`,fmtDate(effDue(a)),""])],
    theme:"grid", headStyles:{fillColor:rust,fontSize:9}, bodyStyles:{fontSize:8},
    columnStyles:{0:{cellWidth:22},1:{cellWidth:95},2:{cellWidth:34},3:{cellWidth:24},4:{cellWidth:24}},
    margin:{left:14,right:14} });
  y=doc.lastAutoTable.finalY+10;
  // Narrative M vs M-1
  if(prev){ if(y>175){ doc.addPage("a4","landscape"); y=18; }
    doc.setTextColor(...forest); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text("3. Synthèse — évolution vs mois précédent",14,y); y+=7;
    doc.setTextColor(...ink); doc.setFont("helvetica","normal"); doc.setFontSize(10);
    const cur=computeSnapshot(p);
    const lines=[
      `Taux de clôture : ${cur.closure}% (${cur.closure-prev.closure>=0?"+":""}${cur.closure-prev.closure} pts vs M-1).`,
      `Avancement moyen : ${cur.avgProgress}% (${cur.avgProgress-prev.avgProgress>=0?"+":""}${cur.avgProgress-prev.avgProgress} pts).`,
      `Actions terminées : ${cur.done} (${cur.done-prev.done>=0?"+":""}${cur.done-prev.done}).`,
      `Actions en retard : ${cur.late} (${cur.late-prev.late>=0?"+":""}${cur.late-prev.late}).`,
      `Actions bloquées : ${cur.blocked} (${cur.blocked-prev.blocked>=0?"+":""}${cur.blocked-prev.blocked}).`,
    ];
    lines.forEach(l=>{ doc.text("•  "+l,16,y); y+=6.5; });
  }
  // full action plan on new page
  doc.addPage("a4","landscape");
  doc.setTextColor(...forest); doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text("Annexe — Plan d'action détaillé",14,16);
  doc.autoTable({ startY:20,
    head:[["Réf.","Sous-projet","Action","Resp.","Prio.","Échéance","%","Statut"]],
    body:actions().map(a=>[a.ref,(a.sousProjet||"").slice(0,22),a.description,a.responsable||"—",a.priorite||"",fmtDate(effDue(a)),(a.avancement||0)+"%",a.statut]),
    theme:"striped", headStyles:{fillColor:forest,fontSize:8}, bodyStyles:{fontSize:7.5},
    columnStyles:{0:{cellWidth:20},1:{cellWidth:36},2:{cellWidth:'auto'},3:{cellWidth:26},4:{cellWidth:18},5:{cellWidth:20},6:{cellWidth:12,halign:"center"},7:{cellWidth:22}},
    didParseCell:d=>{ if(d.section==="body"&&d.column.index===7){ const v=d.cell.raw;
      if(v==="Terminé")d.cell.styles.textColor=forest; else if(v==="Bloqué")d.cell.styles.textColor=rust; } },
    margin:{left:14,right:14} });
  // footer page numbers
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    const H=doc.internal.pageSize.getHeight();
    doc.setDrawColor(...forest); doc.setLineWidth(.3); doc.line(14,H-9,W-14,H-9);
    doc.setFontSize(7.5); doc.setTextColor(...soft);
    doc.text("Business Consulting Partners",14,H-5);
    doc.text(`${p.name} — Comité de pilotage`,W/2,H-5,{align:"center"});
    doc.text(`${i}/${pages}`,W-14,H-5,{align:"right"});
  }
  doc.save(`Comite_${(p.code||"PRJ")}_${todayISO()}.pdf`);
  toast("Support comité exporté en PDF");
}

/* ============================================================
   EXPORT — Support comité (PowerPoint)
   ============================================================ */
function exportComitePPT(){
  if(!LIB.pptx){ toast("Export PowerPoint indisponible (connexion requise)","warn"); return; }
  const p=activeProject(); if(!p){ toast("Aucun projet actif","warn"); return; }
  const s=stats(); const spMap=bySubProject();
  const prev=getSnapshot(prevMonthKey());
  const cur=computeSnapshot(p);
  const monthLabel=new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

  const pres=new PptxGenJS();
  pres.layout="LAYOUT_WIDE"; // 13.333 x 7.5 in
  pres.title=`Support comité — ${p.name}`;
  pres.author="BCP — Business Consulting Partners";

  // Thème couleurs BCP (chaînes hex sans #)
  const C={forest:"13547E",gold:"1A6796",rust:"B3361F",paper:"FFFFFF",cream:"F5F7F9",ink:"40444D",inkSoft:"6B6F78",line:"DDE3E8",sage:"A8C4D8",blueSoft:"EEF3F6",blueTint:"DBE8EF"};

  // Helper : en-tête sobre BCP (logo + nom cabinet en haut-gauche, accent quart de cercle en haut-droite)
  const addBcpHeader=(sl,title)=>{
    // Logo
    try{ sl.addImage({data:BCP_LOGO_MARK,x:0.4,y:0.3,w:0.45,h:0.45}); }catch(e){}
    sl.addText("BUSINESS CONSULTING PARTNERS",{x:0.95,y:0.42,w:5,h:0.3,fontFace:"Inter",fontSize:9,color:C.forest,bold:true,charSpacing:4});
    // Élément décoratif : oval bleu très clair en haut-droite (rappel charte BCP)
    sl.addShape(pres.ShapeType.ellipse,{x:11.5,y:-1.5,w:3.5,h:3.5,fill:{color:C.blueSoft},line:{type:"none"}});
    // Titre de la slide
    if(title){
      sl.addText(title,{x:0.4,y:1.05,w:9,h:0.8,fontFace:"Inter",fontSize:30,color:C.ink,bold:true,charSpacing:-1});
      sl.addShape(pres.ShapeType.line,{x:0.4,y:1.85,w:0.8,h:0,line:{color:C.forest,width:3}});
    }
    // Pied de page : bandeau bleu fin à droite (rappel du visuel BCP)
    sl.addShape(pres.ShapeType.rect,{x:12.83,y:6.5,w:0.5,h:1,fill:{color:C.forest},line:{type:"none"}});
  };

  /* ---- Slide 1 : Couverture (style BCP — sobre, blanche, accent bleu) ---- */
  const s1=pres.addSlide();
  s1.background={color:C.paper};
  // Quart de cercle bleu en haut-droite
  s1.addShape(pres.ShapeType.ellipse,{x:9.5,y:-3,w:7,h:7,fill:{color:C.blueSoft},line:{type:"none"}});
  // Bandeau bleu plein en bas-droite
  s1.addShape(pres.ShapeType.rect,{x:12.33,y:1.5,w:1,h:6,fill:{color:C.forest},line:{type:"none"}});
  // Logo + nom cabinet
  try{ s1.addImage({data:BCP_LOGO_MARK,x:0.7,y:0.7,w:0.5,h:0.5}); }catch(e){}
  s1.addText("BUSINESS CONSULTING PARTNERS",{x:1.32,y:0.83,w:6,h:0.3,fontFace:"Inter",fontSize:10,color:C.forest,bold:true,charSpacing:5});
  // Titre principal
  s1.addText("SUPPORT COMITÉ",{x:0.7,y:2.4,w:11,h:0.6,fontFace:"Inter",fontSize:14,color:C.inkSoft,charSpacing:8});
  s1.addText(esc(p.name),{x:0.7,y:3.0,w:11,h:1.6,fontFace:"Inter",fontSize:52,color:C.ink,bold:true,charSpacing:-1});
  // Méta : client + version + date
  s1.addShape(pres.ShapeType.line,{x:0.7,y:4.9,w:1.2,h:0,line:{color:C.forest,width:3}});
  s1.addText(esc(p.client||"Mission"),{x:0.7,y:5.05,w:11,h:0.4,fontFace:"Inter",fontSize:18,color:C.forest,bold:true});
  s1.addText(`${monthLabel}  ·  Version ${p.version||"1.0"}`,{x:0.7,y:5.55,w:11,h:0.4,fontFace:"Inter",fontSize:13,color:C.inkSoft,italic:true});
  // Petit bandeau d'indicateurs en bas
  s1.addShape(pres.ShapeType.rect,{x:0,y:7.1,w:13.33,h:0.4,fill:{color:C.forest},line:{type:"none"}});
  s1.addText(`Avancement global ${s.avg}%   ·   ${s.done}/${s.total} actions terminées   ·   ${s.late} en retard   ·   ${s.blocked} bloquées`,
    {x:0.4,y:7.15,w:12.5,h:0.32,fontFace:"Inter",fontSize:11,color:"FFFFFF",bold:true,align:"center"});

  /* ---- Slide 2 : Synthèse / KPIs ---- */
  const s2=pres.addSlide();
  s2.background={color:C.paper};
  addBcpHeader(s2,"Synthèse");

  const kpis=[
    {label:"Avancement moyen",value:s.avg+"%",sub:prev?`vs ${prev.avgProgress||0}% en M-1`:""},
    {label:"Taux de clôture",value:s.closure+"%",sub:`${s.done}/${s.total} actions`},
    {label:"Actions en retard",value:String(s.late),sub:s.late>0?"À adresser":"Aucune",color:s.late>0?C.rust:C.forest},
    {label:"Points bloquants",value:String(s.blocked),sub:s.blocked>0?"À débloquer":"Aucun",color:s.blocked>0?C.rust:C.forest}
  ];
  kpis.forEach((k,i)=>{
    const x=0.4+i*3.18, y=2.3, w=3, h=1.85;
    s2.addShape(pres.ShapeType.roundRect,{x,y,w,h,fill:{color:C.cream},line:{color:C.line,width:1},rectRadius:0.06});
    // Filet bleu en haut de chaque carte
    s2.addShape(pres.ShapeType.rect,{x,y,w,h:0.06,fill:{color:k.color||C.forest},line:{type:"none"}});
    s2.addText(k.label.toUpperCase(),{x:x+0.2,y:y+0.25,w:w-0.4,h:0.3,fontFace:"Inter",fontSize:10,color:C.inkSoft,charSpacing:3,bold:true});
    s2.addText(k.value,{x:x+0.2,y:y+0.6,w:w-0.4,h:0.75,fontFace:"Inter",fontSize:38,color:k.color||C.forest,bold:true,charSpacing:-1});
    s2.addText(k.sub,{x:x+0.2,y:y+1.4,w:w-0.4,h:0.35,fontFace:"Inter",fontSize:11,color:C.inkSoft,italic:true});
  });

  // Narratif synthèse
  const narratif=[];
  if(prev){
    const dProg=s.avg-(prev.avgProgress||0);
    if(dProg>0) narratif.push(`Progression de +${dProg} points par rapport à ${prevMonthKey()}.`);
    else if(dProg<0) narratif.push(`Recul de ${dProg} points par rapport à ${prevMonthKey()} — point d'attention.`);
    else narratif.push(`Avancement stable par rapport à ${prevMonthKey()}.`);
  }
  if(s.done>0) narratif.push(`${s.done} actions clôturées sur l'ensemble du périmètre.`);
  if(s.late>0) narratif.push(`${s.late} action(s) en retard nécessitent une relance des responsables.`);
  if(s.blocked>0) narratif.push(`${s.blocked} point(s) bloquant(s) à arbitrer en comité.`);
  if(narratif.length){
    s2.addText("POINTS CLÉS DU PMO",{x:0.4,y:4.5,w:12.5,h:0.3,fontFace:"Inter",fontSize:10,color:C.forest,bold:true,charSpacing:4});
    s2.addShape(pres.ShapeType.line,{x:0.4,y:4.82,w:0.6,h:0,line:{color:C.forest,width:2}});
    s2.addText(narratif.map(t=>({text:"▸  "+t+"\n",options:{fontSize:14,color:C.ink}})),
      {x:0.4,y:4.95,w:12.5,h:2,fontFace:"Inter",valign:"top",paraSpaceAfter:8});
  }

  /* ---- Slide 3 : Avancement par sous-projet ---- */
  const s3=pres.addSlide();
  s3.background={color:C.paper};
  addBcpHeader(s3,"Avancement par sous-projet");

  const spRows=Object.entries(spMap).map(([sp,list])=>{
    const done=list.filter(a=>a.statut==="Terminé").length;
    const avg=Math.round(list.reduce((a,b)=>a+(+b.avancement||0),0)/list.length);
    const late=list.filter(isLate).length;
    const blocked=list.filter(a=>a.statut==="Bloqué").length;
    return [sp,String(list.length),`${done}/${list.length}`,avg+"%",String(late),String(blocked)];
  });
  s3.addTable(
    [
      [{text:"Sous-projet",options:{bold:true,color:"FFFFFF",fill:{color:C.forest}}},
       {text:"Actions",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
       {text:"Clôturées",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
       {text:"Avancement",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
       {text:"Retards",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
       {text:"Bloqués",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}}],
      ...spRows.map(r=>r.map((c,i)=>({text:c,options:{align:i===0?"left":"center",color:C.ink,fill:{color:"FFFFFF"}}})))
    ],
    {x:0.4,y:2.2,w:12.5,colW:[5.5,1.4,1.4,1.6,1.3,1.3],
     fontFace:"Inter",fontSize:12,border:{type:"solid",color:C.line,pt:1},rowH:0.5}
  );

  /* ---- Slide 4 : Points bloquants ---- */
  const blockers=actions().filter(a=>a.statut==="Bloqué");
  if(blockers.length){
    const s4=pres.addSlide();
    s4.background={color:C.paper};
    addBcpHeader(s4,"Points bloquants & alertes");
    s4.addTable(
      [
        [{text:"Action",options:{bold:true,color:"FFFFFF",fill:{color:C.rust}}},
         {text:"Sous-projet",options:{bold:true,color:"FFFFFF",fill:{color:C.rust}}},
         {text:"Responsable",options:{bold:true,color:"FFFFFF",fill:{color:C.rust}}},
         {text:"Échéance",options:{bold:true,color:"FFFFFF",fill:{color:C.rust}}}],
        ...blockers.slice(0,10).map(a=>[
          {text:a.description||"",options:{color:C.ink,fill:{color:"FFFFFF"}}},
          {text:a.sousProjet||"",options:{color:C.inkSoft,fill:{color:"FFFFFF"}}},
          {text:a.responsable||"",options:{color:C.inkSoft,fill:{color:"FFFFFF"}}},
          {text:effDue(a)||"—",options:{color:C.rust,fill:{color:"FFFFFF"}}}
        ])
      ],
      {x:0.4,y:2.2,w:12.5,colW:[6.7,2,2.3,1.5],fontFace:"Inter",fontSize:11,border:{type:"solid",color:C.line,pt:1},rowH:0.45}
    );
  }

  /* ---- Slide 5 : Retards à relancer ---- */
  const lates=actions().filter(isLate);
  if(lates.length){
    const s5=pres.addSlide();
    s5.background={color:C.paper};
    addBcpHeader(s5,"Actions en retard à relancer");
    s5.addTable(
      [
        [{text:"Action",options:{bold:true,color:"FFFFFF",fill:{color:C.gold}}},
         {text:"Responsable",options:{bold:true,color:"FFFFFF",fill:{color:C.gold}}},
         {text:"Échéance",options:{bold:true,color:"FFFFFF",fill:{color:C.gold}}},
         {text:"Retard",options:{bold:true,color:"FFFFFF",fill:{color:C.gold},align:"center"}},
         {text:"Avancement",options:{bold:true,color:"FFFFFF",fill:{color:C.gold},align:"center"}}],
        ...lates.slice(0,12).map(a=>[
          {text:a.description||"",options:{color:C.ink,fill:{color:"FFFFFF"}}},
          {text:a.responsable||"",options:{color:C.inkSoft,fill:{color:"FFFFFF"}}},
          {text:effDue(a)||"—",options:{color:C.rust,fill:{color:"FFFFFF"}}},
          {text:daysLate(a)+" j",options:{color:C.rust,fill:{color:"FFFFFF"},align:"center",bold:true}},
          {text:(a.avancement||0)+"%",options:{color:C.ink,fill:{color:"FFFFFF"},align:"center"}}
        ])
      ],
      {x:0.4,y:2.2,w:12.5,colW:[6.1,2.3,1.8,1.2,1.1],fontFace:"Inter",fontSize:11,border:{type:"solid",color:C.line,pt:1},rowH:0.42}
    );
  }

  /* ---- Slide 6 : Comparatif M vs M-1 ---- */
  if(prev){
    const s6=pres.addSlide();
    s6.background={color:C.paper};
    addBcpHeader(s6,`Comparatif ${prevMonthKey()} → ${monthKey()}`);
    const compRow=(label,p,c,suffix="",invert=false)=>{
      const d=c-p; const up=d>0; const good=invert?!up:up;
      const color=d===0?C.inkSoft:(good?C.forest:C.rust);
      const arrow=d===0?"→":(up?"▲":"▼");
      return [
        {text:label,options:{color:C.ink,fill:{color:"FFFFFF"},bold:true}},
        {text:p+suffix,options:{color:C.inkSoft,fill:{color:"FFFFFF"},align:"center"}},
        {text:c+suffix,options:{color:C.ink,fill:{color:"FFFFFF"},align:"center",bold:true}},
        {text:`${arrow} ${d>0?"+":""}${d}${suffix}`,options:{color,fill:{color:"FFFFFF"},align:"center",bold:true}}
      ];
    };
    s6.addTable(
      [
        [{text:"Indicateur",options:{bold:true,color:"FFFFFF",fill:{color:C.forest}}},
         {text:prevMonthKey(),options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
         {text:monthKey(),options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}},
         {text:"Évolution",options:{bold:true,color:"FFFFFF",fill:{color:C.forest},align:"center"}}],
        compRow("Avancement moyen",prev.avgProgress||0,cur.avgProgress,"%"),
        compRow("Taux de clôture",prev.closure||0,cur.closure,"%"),
        compRow("Actions terminées",prev.done||0,cur.done),
        compRow("Actions en retard",prev.late||0,cur.late,"",true),
        compRow("Points bloquants",prev.blocked||0,cur.blocked,"",true)
      ],
      {x:0.4,y:2.2,w:12.5,colW:[5.2,2.4,2.4,2.5],fontFace:"Inter",fontSize:13,border:{type:"solid",color:C.line,pt:1},rowH:0.55}
    );
    // Narratif comparatif (HTML → texte brut)
    const narrHtml=comparatifNarrative(cur,prev);
    const narr=narrHtml.replace(/<[^>]+>/g," ").replace(/\s+/g," ").replace(/\s•\s/g,"\n• ").trim();
    if(narr){
      s6.addText("LECTURE PMO",{x:0.4,y:5.6,w:12.5,h:0.3,fontFace:"Inter",fontSize:10,color:C.forest,bold:true,charSpacing:4});
      s6.addText(narr,{x:0.4,y:5.95,w:12.5,h:1.4,fontFace:"Inter",fontSize:12,color:C.ink,valign:"top"});
    }
  }

  /* ---- Slide finale : Prochaines étapes (style BCP) ---- */
  const next=actions().filter(a=>a.statut!=="Terminé" && a.priorite==="Haute").slice(0,6);
  if(next.length){
    const sf=pres.addSlide();
    sf.background={color:C.paper};
    addBcpHeader(sf,"Prochaines étapes — priorité haute");
    next.forEach((a,i)=>{
      const y=2.4+i*0.75;
      // Pastille numérotée à gauche
      sf.addShape(pres.ShapeType.ellipse,{x:0.5,y,w:0.5,h:0.5,fill:{color:C.forest},line:{type:"none"}});
      sf.addText(String(i+1),{x:0.5,y,w:0.5,h:0.5,fontFace:"Inter",fontSize:16,color:"FFFFFF",bold:true,align:"center",valign:"middle"});
      // Description
      sf.addText(a.description||"",{x:1.15,y:y-0.02,w:9.5,h:0.4,fontFace:"Inter",fontSize:15,color:C.ink,bold:true});
      // Méta : responsable + échéance
      sf.addText(`${a.responsable||"non assigné"}  ·  échéance ${effDue(a)||"non datée"}  ·  ${a.sousProjet||""}`,
        {x:1.15,y:y+0.32,w:11.5,h:0.3,fontFace:"Inter",fontSize:11,color:C.inkSoft});
    });
  }

  /* ---- Slide de clôture ---- */
  const sc=pres.addSlide();
  sc.background={color:C.forest};
  // Quart de cercle bleu clair en bas-droite
  sc.addShape(pres.ShapeType.ellipse,{x:9.5,y:5,w:7,h:7,fill:{color:C.gold},line:{type:"none"}});
  try{ sc.addImage({data:BCP_LOGO_MARK,x:0.7,y:0.7,w:0.6,h:0.6}); }catch(e){}
  sc.addText("BUSINESS CONSULTING PARTNERS",{x:1.4,y:0.85,w:8,h:0.3,fontFace:"Inter",fontSize:11,color:"FFFFFF",bold:true,charSpacing:5});
  sc.addText("Merci",{x:0.7,y:3,w:11,h:1.6,fontFace:"Inter",fontSize:80,color:"FFFFFF",bold:true,charSpacing:-2});
  sc.addShape(pres.ShapeType.line,{x:0.7,y:4.6,w:1.5,h:0,line:{color:"FFFFFF",width:3}});
  sc.addText("Des questions ? Des arbitrages ?",{x:0.7,y:4.85,w:11,h:0.5,fontFace:"Inter",fontSize:20,color:"FFFFFF"});

function after_data(){
  const dz=$("#dropZone"); if(!dz) return;
  ["dragenter","dragover"].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add("drag");}));
  ["dragleave","drop"].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove("drag");}));
  dz.addEventListener("drop",ev=>{ const f=ev.dataTransfer.files[0]; if(f) importExcel(f); });
}
function exportExcel(){
  if(!LIB.xlsx){ toast("Export Excel indisponible hors connexion","warn"); return; }
  const p=activeProject(); const wb=XLSX.utils.book_new();
  const header=["N°","Sous-Projet","Description de l'Action","Responsable","Type d'Action","Priorité",
    "Date Début Planifiée","Date Fin Planifiée","Date Fin Révisée","Charge (j/h)","Avancement (%)","Statut","Alerte","Livrables","Commentaire","Réf."];
  const rows=p.actions.map((a,i)=>[i+1,a.sousProjet,a.description,a.responsable,a.type,a.priorite,
    a.dateDebutPlan,a.dateFinPlan,a.dateFinRevisee,a.charge,a.avancement,a.statut,isLate(a)?"⚠️":"",a.livrables,a.commentaire,a.ref]);
  const ws=XLSX.utils.aoa_to_sheet([[`PLAN D'ACTION – ${p.name}`],[`Client : ${p.client||""} | v${p.version} | ${todayISO()}`],[],header,...rows]);
  ws["!cols"]=[{wch:5},{wch:26},{wch:55},{wch:18},{wch:16},{wch:10},{wch:14},{wch:14},{wch:14},{wch:10},{wch:12},{wch:11},{wch:7},{wch:24},{wch:34},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,"Plan d'Action");
  // dashboard sheet
  const s=stats(); const spMap=bySubProject();
  const dash=[["PMO DASHBOARD – "+p.name],[],["Total","Terminées","En cours","Bloquées","Retard","Clôture %","Avancement %"],
    [s.total,s.done,s.doing,s.blocked,s.late,s.closure,s.avgProgress],[],
    ["Sous-Projet","Total","À faire","En cours","Terminé","Bloqué","Clôture %"]];
  Object.entries(spMap).forEach(([sp,l])=>dash.push([sp,l.length,
    l.filter(a=>a.statut==="À faire").length,l.filter(a=>a.statut==="En cours").length,
    l.filter(a=>a.statut==="Terminé").length,l.filter(a=>a.statut==="Bloqué").length,
    Math.round(l.filter(a=>a.statut==="Terminé").length/l.length*100)]));
  const wd=XLSX.utils.aoa_to_sheet(dash); wd["!cols"]=[{wch:30},{wch:8},{wch:9},{wch:9},{wch:9},{wch:9},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wd,"PMO Dashboard");
  XLSX.writeFile(wb,`PlanAction_${(p.code||"PRJ")}_${todayISO()}.xlsx`);
  toast("Projet exporté en Excel");
}
function importExcel(file){
  if(!file) return;
  if(!LIB.xlsx){ toast("Import Excel indisponible hors connexion","warn"); return; }
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
      // find the plan sheet (with headers)
      let best=null,bestRows=null;
      wb.SheetNames.forEach(sn=>{ const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:false,defval:""});
        const hi=rows.findIndex(rw=>rw.some(c=>/description/i.test(String(c)))&&rw.some(c=>/sous.?projet/i.test(String(c))));
        if(hi>=0){ best={sn,hi}; bestRows=rows; } });
      if(!best){ toast("Aucune feuille de plan d'action reconnue","warn"); return; }
      const hdr=bestRows[best.hi].map(h=>String(h).toLowerCase());
      const col=(re)=>hdr.findIndex(h=>re.test(h));
      const ci={sp:col(/sous.?projet/),desc:col(/description/),resp:col(/responsable/),type:col(/type/),
        prio:col(/priorit/),deb:col(/d[ée]but/),fin:col(/fin.*planifi|fin\b/),rev:col(/r[ée]vis/),
        charge:col(/charge/),av:col(/avancement/),st:col(/statut/),liv:col(/livrable/),com:col(/commentaire/)};
      const parseD=v=>{ if(!v) return ""; if(v instanceof Date) return v.toISOString().slice(0,10);
        if(typeof v==="number") return excelSerialToISO(v);
        const m=String(v).match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/); if(m){let[_,d,mo,y]=m;if(y.length===2)y="20"+y;return `${y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`;}
        const d=new Date(v); return isNaN(d)?"":d.toISOString().slice(0,10); };
      const acts=[];
      for(let i=best.hi+1;i<bestRows.length;i++){ const rw=bestRows[i];
        const desc=String(rw[ci.desc]||"").trim(); if(!desc) continue;
        let st=String(rw[ci.st]||"À faire").trim(); if(!STATUTS.includes(st)) st="À faire";
        let av=parseInt(String(rw[ci.av]).replace(/[^\d]/g,""))||0; if(av<=1&&av>0)av=av*100;
        acts.push({ id:uid(), sousProjet:String(rw[ci.sp]||"").trim().replace(/\n/g," "),
          description:desc, responsable:String(rw[ci.resp]||"").trim(),
          type:String(rw[ci.type]||"✏️ Conception").trim(), priorite:(["Haute","Moyenne","Faible"].find(p=>p===String(rw[ci.prio]).trim())||"Moyenne"),
          dateDebutPlan:parseD(rw[ci.deb]), dateFinPlan:parseD(rw[ci.fin]), dateFinRevisee:parseD(rw[ci.rev]),
          charge:String(rw[ci.charge]||""), avancement:Math.min(100,av), statut:st,
          livrables:String(rw[ci.liv]||"").trim(), commentaire:String(rw[ci.com]||"").trim(), autoRef:true, history:[] }); }
      if(!acts.length){ toast("Aucune action trouvée dans le fichier","warn"); return; }
      const name=file.name.replace(/\.(xlsx|xls)$/i,"");
      const np={ id:uid(), name, client:"", code:(name.match(/[A-Z]{2,4}/)?.[0]||"IMP"), version:"1.0", statut:"En cours",
        createdAt:Date.now(), actions:acts, snapshots:{}, comites:[] };
      reindexRefs(np); np.snapshots[monthKey()]=computeSnapshot(np);
      DB.projects.push(np); DB.activeId=np.id; save();
      toast(`${acts.length} action(s) importée(s) dans « ${name} »`);
      go("actions");
    }catch(err){ console.error(err); toast("Erreur de lecture du fichier Excel","warn"); }
  };
  r.readAsArrayBuffer(file);
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`PMO_Sauvegarde_${todayISO()}.json`; a.click();
  toast("Sauvegarde complète téléchargée");
}
function importBackup(file){
  if(!file) return; const r=new FileReader();
  r.onload=e=>{ try{ const data=JSON.parse(e.target.result);
    if(!data.projects) throw new Error("format");
    if(!confirm("Restaurer cette sauvegarde ? Vos données actuelles seront remplacées.")) return;
    DB=data; if(!DB.settings) DB.settings={consultant:"",logo:""}; save(); render(); toast("Sauvegarde restaurée");
  }catch(err){ toast("Fichier de sauvegarde invalide","warn"); } };
  r.readAsText(file);
}
function resetAll(){
  if(!confirm("Effacer TOUTES les données et revenir au projet de démonstration ?")) return;
  localStorage.removeItem(LS_KEY); DB={projects:[],activeId:null,settings:{consultant:"",logo:""}};
  load(); UI.view="dashboard"; render(); toast("Données réinitialisées","warn");
}
